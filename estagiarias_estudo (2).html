{q:'Qual frase está sem vício de linguagem?',ctx:'',opts:['Estarei enviando o relatório amanhã pela manhã.','A nível de prazo, tudo está regularizado.','Como houve atraso, solicitamos prorrogação do prazo.','O resultado final será apresentado na próxima semana.'],correct:2,exp:'"Como houve atraso, solicitamos prorrogação" — sem gerundismo, sem "a nível de", sem pleonasmo. As demais: "estarei enviando" = gerundismo; "a nível de" = vício; "resultado final" = pleonasmo.'},
{q:'Qual conectivo completa corretamente a frase?',ctx:'A documentação estava completa; ___, o cadastro foi aprovado.',opts:['porém','no entanto','todavia','portanto'],correct:3,exp:'"Portanto" indica conclusão lógica: documentação completa → cadastro aprovado. "Porém", "no entanto" e "todavia" indicariam contraste, o que contradiz o sentido da frase.'}
]},
{type:'finish',phase:'Parabéns!'}
]}
]},
{id:'rev1',title:'Revisão — Módulos 1 e 2',desc:'Revisão integrada: pronomes e verbo haver — 20 minutos.',sessions:[
{id:'rev1s1',day:'Segunda',title:'Revisão A — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 1 e 2: <strong>pronomes</strong> ("a mesma", "este/esse") e <strong>verbo haver</strong>.</div><div class="rule">Lembre-se:<br>— "A mesma / o mesmo" para retomar pessoa → erro. Use ele/ela.<br>— "Este/esta/esse" para retomar pessoa → erro. Use ele/ela.<br>— Haver (existir/tempo) → sempre singular: houve, havia, há.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase elimina corretamente todos os vícios?',ctx:'"Falei com a Dra. Ana e a mesma disse que houveram adiamentos."',opts:['Falei com a Dra. Ana e esta disse que houveram adiamentos.','Falei com a Dra. Ana e ela disse que houve adiamentos.','Falei com a Dra. Ana e a mesma disse que houve adiamentos.','Falei com a Dra. Ana e ela disse que houveram adiamentos.'],correct:1,exp:'Dois erros: "a mesma" (→ ela) e "houveram" (→ houve). Só a opção B corrige ambos.'},
{q:'Qual frase usa "haver" e pronome corretamente?',ctx:'',opts:['Havia processos parados e os mesmos foram redistribuídos.','Haviam processos parados e eles foram redistribuídos.','Havia processos parados e eles foram redistribuídos.','Houveram processos parados e os mesmos foram redistribuídos.'],correct:2,exp:'"Havia" (singular, impessoal) e "eles" (pronome pessoal). B erra em "haviam"; A e D usam "os mesmos".'},
{q:'Identifique o erro na frase:',ctx:'"Liguei para a secretaria e esta me informou que haviam dois processos aguardando."',opts:['Apenas "esta" está errado.','Apenas "haviam" está errado.','Tanto "esta" quanto "haviam" estão errados.','A frase está correta.'],correct:2,exp:'Dois erros: "esta" retoma pessoa (→ "ela") e "haviam" — haver impessoal não vai ao plural (→ "havia").'},
{q:'Qual frase está completamente correta?',ctx:'',opts:['Houveram pendências e as mesmas foram resolvidas ontem.','Houve pendências e elas foram resolvidas ontem.','Haviam pendências e as mesmas foram resolvidas ontem.','Houve pendências e as mesmas foram resolvidas ontem.'],correct:1,exp:'"Houve" (singular) e "elas" (pronome correto). As demais erram em plural ou vício pronominal.'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev1s2',day:'Quinta',title:'Revisão A — Parte 2',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Continuação. Fique atento a frases que combinam os dois erros ao mesmo tempo.</div><div class="rule">Checklist:<br>1. Tem "a mesma/o mesmo"? → substitua por ele/ela.<br>2. Tem "este/esta" retomando pessoa? → substitua por ele/ela.<br>3. Tem "houveram/haviam/havem"? → corrija para houve/havia/há.<br>4. Tem "há... atrás"? → elimine o "atrás".</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual pronome retoma corretamente "o juiz"?',ctx:'"O juiz recebeu a petição e ___ a encaminhou ao cartório."',opts:['...e este a encaminhou.','...e o mesmo a encaminhou.','...e ele a encaminhou.','...e o próprio a encaminhou.'],correct:2,exp:'"Ele" retoma "o juiz". "Este" é demonstrativo, "o mesmo" e "o próprio" são vícios.'},
{q:'Qual frase indica tempo decorrido corretamente?',ctx:'"O processo tramita sem movimentação ___ seis meses."',opts:['...haviam seis meses.','...fazem seis meses.','...há seis meses.','...houveram seis meses.'],correct:2,exp:'"Há seis meses" — haver de tempo é impessoal, sempre no singular.'},
{q:'Qual das frases contém apenas um erro?',ctx:'',opts:['Houve adiamentos e a mesma parte não compareceu.','Houveram adiamentos e ela não compareceu.','Havia processos e os mesmos foram redistribuídos.','Há dois anos atrás o contrato foi firmado.'],correct:1,exp:'B tem apenas um erro: "houveram" (→ houve). "Ela" está correto. As demais têm dois erros cada.'},
{q:'Qual frase está completamente correta?',ctx:'',opts:['Há dois anos atrás, esta foi nomeada para o cargo.','Faz dois anos que ela ocupa o cargo.','Haviam dois anos que a mesma ocupava o cargo.','Fazem dois anos que esta ocupa o cargo.'],correct:1,exp:'"Faz dois anos" (singular, impessoal) e "ela" (pronome correto). As demais acumulam erros.'}
]},{type:'finish',phase:'Conclusão (3 min)'}]}
]},
{id:'rev2',title:'Revisão — Módulos 3 e 4',desc:'Revisão integrada: vírgula, "mas/mais" e concordância verbal e nominal — 20 minutos.',sessions:[
{id:'rev2s1',day:'Segunda',title:'Revisão B — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 3 e 4: <strong>vírgula</strong>, <strong>"mas/mais"</strong> e <strong>concordância</strong>.</div><div class="rule">Lembre-se:<br>— Nunca vírgula entre sujeito e verbo.<br>— "Mais" = quantidade; "mas" = porém.<br>— O verbo concorda com o núcleo do sujeito.<br>— "Em anexo" é invariável; "obrigada" para mulheres.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase tem vírgula e concordância corretas?',ctx:'',opts:['A lista de documentos, foram entregues ao cliente.','A lista de documentos foi entregue ao cliente.','A lista de documentos, foi entregue ao cliente.','A lista de documentos foram entregue ao cliente.'],correct:1,exp:'Sem vírgula entre sujeito e verbo; concordância: "a lista" (singular) → "foi entregue".'},
{q:'Quantos erros há nesta frase?',ctx:'"A servidora Juliana, me informou que o prazo venceu, mais que o processo foram arquivado."',opts:['1 erro','2 erros','3 erros','4 erros'],correct:2,exp:'Três erros: vírgula após "Juliana"; "mais" → "mas"; "foram arquivado" → "foi arquivado".'},
{q:'Qual frase usa vírgula e "mas/mais" corretamente?',ctx:'',opts:['Protocolei o recurso, mais ele foi indeferido.','Protocolei o recurso, mas, ele foi indeferido.','Protocolei o recurso, mas ele foi indeferido.','Protocolei o recurso mais, ele foi indeferido.'],correct:2,exp:'"Mas" adversativo correto e sem vírgula desnecessária após "mas".'},
{q:'Qual frase está completamente correta?',ctx:'',opts:['Seguem em anexas as certidões, mais uma delas, foi extraviada.','Seguem em anexo as certidões, mas uma delas foi extraviada.','Seguem em anexo as certidões mas, uma delas foi extraviada.','Seguem em anexas as certidões mas uma delas foi extraviada.'],correct:1,exp:'"Em anexo" invariável, "mas" correto, vírgula adequada.'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev2s2',day:'Quinta',title:'Revisão B — Parte 2',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Continuação. Atenção a frases onde vírgula e concordância estão erradas ao mesmo tempo.</div><div class="rule">Checklist:<br>1. Separei sujeito do verbo com vírgula? → remova.<br>2. Usei "mais" no lugar de "mas"? → corrija.<br>3. O verbo concorda com o núcleo do sujeito? → verifique.<br>4. Particípios concordam com o substantivo? → verifique.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase tem concordância nominal correta?',ctx:'',opts:['Obrigado pela atenção. (dito por mulher)','O réu, representado pelo Dr. Figueiredo compareceu.','O contrato e a proposta estão prontos para assinatura.','O conjunto de certidões foram juntadas aos autos.'],correct:2,exp:'"O contrato e a proposta estão prontos" — dois substantivos → masculino plural.'},
{q:'Qual frase usa dois-pontos e tem concordância certa?',ctx:'',opts:['Os documentos consistem em: certidão, procuração e RG.','Os documentos consistem em três itens: certidão, procuração e RG.','Os documentos consiste em três itens: certidão, procuração e RG.','Os documento consistem em três itens: certidão, procuração e RG.'],correct:1,exp:'"Consistem" concorda com "os documentos" e os dois-pontos vêm após sentido completo.'},
{q:'Qual frase está sem erros?',ctx:'',opts:['A maioria dos documentos foram enviados ao cliente.','A maioria dos documentos foi enviada ao cliente.','A maioria dos documentos foram enviadas ao cliente.','A maioria dos documentos foi enviados ao cliente.'],correct:1,exp:'"A maioria" é singular feminino → "foi enviada".'},
{q:'Qual é a versão correta?',ctx:'"O grupo de estagiárias, realizaram as atividades, mais uma delas, não entregou."',opts:['O grupo de estagiárias realizou as atividades, mas uma delas não entregou.','O grupo de estagiárias, realizaram as atividades mas uma delas não entregou.','O grupo de estagiárias realizaram as atividades, mas uma delas, não entregou.','O grupo de estagiárias realizou as atividades mais uma delas não entregou.'],correct:0,exp:'Quatro correções: sem vírgula entre sujeito e verbo; "realizou" (singular); "mas" no lugar de "mais"; sem vírgula após "delas".'}
]},{type:'finish',phase:'Conclusão (3 min)'}]}
]},
{id:'rev3',title:'Revisão — Módulos 5 e 6',desc:'Revisão integrada: crase e regência verbal — 20 minutos.',sessions:[
{id:'rev3s1',day:'Segunda',title:'Revisão C — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 5 e 6: <strong>crase</strong> e <strong>regência verbal</strong>.</div><div class="rule">Lembre-se:<br>— Crase = preposição "a" + artigo "a" (antes de femininos que admitem artigo).<br>— Pronomes pessoais nunca levam crase.<br>— Visar (objetivar) → a; Assistir (presenciar) → a; Preferir → a; Implicar (acarretar) → sem preposição; Proceder → a.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase tem crase e regência corretas?',ctx:'',opts:['A medida visa a atender às necessidades do cliente.','A medida visa atender a necessidades do cliente.','A medida visa a atender a necessidades do cliente.','A medida visa atender às necessidades do cliente.'],correct:0,exp:'"Visa a" (regência correta) e "às necessidades" (preposição + artigo feminino = crase).'},
{q:'Qual frase contém erro de crase?',ctx:'',opts:['Às 14h, o advogado assistiu à audiência.','Encaminhou o processo à assessora.','Enviei o e-mail à ela para revisão.','O documento ficou à disposição das partes.'],correct:2,exp:'"À ela" está errado — pronomes pessoais nunca levam crase.'},
{q:'Qual frase tem regência verbal correta?',ctx:'',opts:['O cliente assistiu a sessão de conciliação.','O cliente assistiu à sessão de conciliação.','O cliente assistiu em sessão de conciliação.','O cliente assistiu na sessão de conciliação.'],correct:1,exp:'"Assistir" (presenciar) exige "a": "assistiu à sessão".'},
{q:'Qual combina crase e regência corretamente?',ctx:'',opts:['Prefiro esta proposta mais que à anterior.','Prefiro esta proposta à anterior.','Prefiro esta proposta a anterior.','Prefiro esta proposta do que a anterior.'],correct:1,exp:'"Preferir" exige "a"; substantivo feminino → crase: "à anterior".'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev3s2',day:'Quinta',title:'Revisão C — Parte 2',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Continuação da revisão de crase e regência verbal.</div><div class="rule">Checklist:<br>1. Há preposição "a" antes de feminino? → verifique se precisa de crase.<br>2. É pronome pessoal ou nome de cidade sem artigo? → nunca crase.<br>3. O verbo pede preposição específica? → consulte a regência correta.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase está correta?',ctx:'',opts:['Procedemos com a análise dos documentos às 9h.','Procedemos à análise dos documentos às 9h.','Procedemos a análise dos documentos as 9h.','Procedemos em análise dos documentos à 9h.'],correct:1,exp:'"Procedemos à análise" (proceder + a + artigo = crase) e "às 9h" (hora → sempre crase).'},
{q:'Qual frase tem crase errada?',ctx:'',opts:['Às vezes o prazo é prorrogado.','A reunião acontecerá à tarde.','Fui à Brasília entregar os documentos.','O processo ficou à margem do prazo legal.'],correct:2,exp:'"Fui à Brasília" está errado — Brasília não usa artigo, portanto não há crase.'},
{q:'Qual uso de "implicar" está correto?',ctx:'',opts:['A cláusula implica em multa de 10%.','A cláusula implica em penalidade ao contratante.','A cláusula implica multa de 10%.','A cláusula implica em rescisão imediata.'],correct:2,exp:'"Implicar" (acarretar) é transitivo direto — sem "em".'},
{q:'Qual frase combina crase, regência e concordância corretamente?',ctx:'',opts:['Às 10h, o réu assistiu à audiência e o mesmo saiu sem falar.','Às 10h, o réu assistiu à audiência e saiu sem se manifestar.','As 10h, o réu assistiu a audiência e ele saiu sem falar.','Às 10h, o réu assistiu à audiência e este saiu sem se manifestar.'],correct:1,exp:'"Às 10h" (crase), "assistiu à" (regência + crase), sem vício pronominal (elipse). D usa "este" para retomar pessoa.'}
]},{type:'finish',phase:'Conclusão (3 min)'}]}
]},
{id:'rev4',title:'Revisão — Módulos 7 e 8',desc:'Revisão integrada: regência nominal e redundâncias — 20 minutos.',sessions:[
{id:'rev4s1',day:'Segunda',title:'Revisão D — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 7 e 8: <strong>regência nominal</strong> e <strong>redundâncias</strong>.</div><div class="rule">Lembre-se:<br>— Apto a; compatível com; contrário a; favorável a; responsável por; dúvida sobre.<br>— Pleonasmos: "consenso geral", "resultado final", "certeza absoluta", "subir para cima".<br>— Expressões inchadas: "no sentido de" → para; "pelo fato de que" → porque.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase tem regência nominal correta e está sem pleonasmo?',ctx:'',opts:['Tenho certeza absoluta da compatibilidade do contrato com a norma.','Tenho certeza da compatibilidade do contrato com a norma.','Tenho certeza absoluta da compatibilidade do contrato ao regulamento.','Tenho certeza da compatibilidade do contrato ao regulamento.'],correct:1,exp:'"Certeza absoluta" é pleonasmo e "compatível com" exige "com". B elimina o pleonasmo e usa a regência correta.'},
{q:'Qual frase elimina pleonasmo e mantém regência correta?',ctx:'"Tenho dúvidas do resultado final que será apresentado."',opts:['Tenho dúvidas do resultado que será apresentado.','Tenho dúvidas sobre o resultado que será apresentado.','Tenho dúvidas sobre o resultado final que será apresentado.','Tenho dúvidas a respeito do resultado final.'],correct:1,exp:'Dois problemas: "dúvidas de" (→ sobre) e "resultado final" (pleonasmo). B corrige ambos.'},
{q:'Qual frase está mais objetiva e correta?',ctx:'',opts:['Tendo em vista o fato de que houve consenso geral, aprovamos a proposta.','Por haver consenso, aprovamos a proposta.','Pelo fato de que houve um consenso geral entre todos, aprovamos a proposta.','Em função de ter havido consenso geral, procedemos com a aprovação.'],correct:1,exp:'"Por haver consenso, aprovamos" — sem expressão inchada, sem pleonasmo, sem "procedemos com".'},
{q:'Quantos problemas há na frase?',ctx:'"Na oportunidade, informo que o resultado final da reunião foi um consenso geral entre todos."',opts:['1 problema','2 problemas','3 problemas','4 problemas'],correct:2,exp:'Três problemas: "na oportunidade" (desnecessário); "resultado final" (pleonasmo); "consenso geral entre todos" (pleonasmo duplo).'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev4s2',day:'Quinta',title:'Revisão D — Parte 2',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Continuação. Atenção a frases que combinam regência nominal com pleonasmo.</div><div class="rule">Checklist:<br>1. Dúvida de → dúvida sobre.<br>2. Apto para → apto a.<br>3. Responsável de/em → responsável por.<br>4. Consenso geral, resultado final, certeza absoluta → retire o adjetivo.<br>5. "No sentido de", "tendo em vista o fato de que" → simplifique.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase está isenta de pleonasmo e com regência adequada?',ctx:'',opts:['Em função de que houve atraso, solicitamos prazo adicional.','Como houve atraso, solicitamos prorrogação do prazo.','Pelo fato de que houve um atraso, solicitamos uma prorrogação de prazo adicional.','Tendo em vista o atraso, solicitamos prorrogação de prazo adicional.'],correct:1,exp:'"Como houve atraso, solicitamos prorrogação do prazo" — sem expressões inchadas, sem redundâncias.'},
{q:'Qual versão reescreve corretamente?',ctx:'"Subimos para cima ao plenário e lá chegamos a um consenso geral."',opts:['Subimos ao plenário e chegamos a um consenso geral.','Subimos ao plenário e chegamos a um consenso.','Fomos para cima ao plenário e chegamos a um consenso.','Subimos para o plenário e lá chegamos a consenso geral.'],correct:1,exp:'Elimina "para cima" (pleonasmo com "subir") e "geral" (pleonasmo com "consenso").'},
{q:'Qual frase tem regência nominal correta e está sem pleonasmo?',ctx:'',opts:['Tenho dúvida do prazo e estou apto para resolver a questão.','Tenho dúvida sobre o prazo e estou apta a resolver a questão.','Tenho dúvida sobre o prazo e estou apta para resolver a questão.','Tenho certeza absoluta do prazo e estou apta a resolver a questão.'],correct:1,exp:'"Dúvida sobre" e "apta a" — ambas as regências corretas, sem pleonasmo.'},
{q:'Qual frase está completamente correta e objetiva?',ctx:'',opts:['A estagiária é responsável pelo setor e tem dúvidas do resultado final.','A estagiária é responsável pelo setor e tem dúvidas sobre o resultado.','A estagiária é responsável para o setor e tem dúvidas sobre o resultado.','A estagiária é responsável do setor e tem certeza absoluta do resultado.'],correct:1,exp:'"Responsável por", "dúvidas sobre", sem pleonasmo ("resultado" sem "final").'}
]},{type:'finish',phase:'Conclusão (3 min)'}]}
]},
{id:'rev5',title:'Revisão — Módulos 9 e 10',desc:'Revisão integrada: vícios de linguagem, gerundismo, conectivos e coesão — 20 minutos.',sessions:[
{id:'rev5s1',day:'Segunda',title:'Revisão E — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 9 e 10: <strong>vícios de linguagem</strong> e <strong>conectivos</strong>.</div><div class="rule">Lembre-se:<br>— Gerundismo: "estarei enviando" → "enviarei".<br>— "A nível de" → quanto a; "em termos de" → quanto a; "enquanto" (como) → como.<br>— Adversativos: mas, porém, no entanto. Conclusivos: portanto, logo, assim.</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual frase elimina gerundismo e usa conectivo correto?',ctx:'"Estarei analisando o contrato, portanto ainda não tenho resposta."',opts:['Estarei analisando o contrato; portanto, ainda não tenho resposta.','Analisarei o contrato; portanto, ainda não tenho resposta.','Analisarei o contrato, mas ainda não tenho resposta.','Vou estar analisando o contrato, mas ainda não tenho resposta.'],correct:2,exp:'Dois problemas: gerundismo (→ "analisarei") e "portanto" (indica conclusão; aqui é contraste → "mas").'},
{q:'Qual frase usa conectivo correto e está sem vício?',ctx:'',opts:['A nível de prazo, estarei verificando e retornarei o contato.','Quanto ao prazo, verificarei e retornarei o contato.','Em termos de prazo, vou estar verificando e retornarei o contato.','A nível de prazo, verificarei e retornarei o contato.'],correct:1,exp:'"Quanto ao prazo" (no lugar de "a nível de") e "verificarei" (sem gerundismo).'},
{q:'Qual frase está correta quanto a conectivos?',ctx:'',opts:['O prazo venceu; portanto, o recurso foi interposto mesmo assim.','O prazo venceu; no entanto, o recurso foi interposto mesmo assim.','O prazo venceu, logo, o recurso foi interposto mesmo assim.','O prazo venceu. Portanto o recurso foi interposto mesmo assim.'],correct:1,exp:'"No entanto" indica contraste. "Portanto" e "logo" indicariam conclusão lógica, o que contradiz "mesmo assim".'},
{q:'Qual frase está completamente correta?',ctx:'',opts:['Enquanto gestora, estarei acompanhando o progresso a nível de desempenho.','Como gestora, acompanharei o progresso quanto ao desempenho.','Enquanto que gestora, vou estar acompanhando o progresso em termos de desempenho.','Como gestora, estarei acompanhando o progresso em termos de desempenho.'],correct:1,exp:'"Como gestora", "acompanharei" (sem gerundismo), "quanto ao desempenho". D ainda tem gerundismo.'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev5s2',day:'Quinta',title:'Revisão E — Parte 2',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Continuação. Atenção a frases que acumulam gerundismo, vício de linguagem e conectivo errado.</div><div class="rule">Checklist:<br>1. "Estarei/vou estar + gerúndio"? → use o futuro simples.<br>2. "A nível de / em termos de"? → substitua por "quanto a".<br>3. "Enquanto" no sentido de "como"? → substitua por "como".<br>4. O conectivo exprime a relação correta?</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual versão é mais coesa e sem vícios?',ctx:'"A nível de documentação, estarei enviando os documentos e os mesmos serão analisados."',opts:['A nível de documentação, enviarei os documentos e eles serão analisados.','Quanto à documentação, enviarei os documentos, que serão analisados.','Em termos de documentação, os documentos serão enviados e os mesmos analisados.','Quanto à documentação, estarei enviando os documentos e eles serão analisados.'],correct:1,exp:'B elimina: "a nível de", gerundismo e vício pronominal. É também a mais coesa.'},
{q:'Qual sequência de conectivos está correta?',ctx:'"___ analisamos. ___ identificamos as pendências. ___ emitimos o parecer."',opts:['Portanto / Em seguida / Primeiramente','Primeiramente / Em seguida / Por fim','Por fim / Primeiramente / Em seguida','Em seguida / Por fim / Primeiramente'],correct:1,exp:'"Primeiramente / Em seguida / Por fim" — sequência temporal e lógica correta.'},
{q:'Qual frase tem coesão e está sem vício?',ctx:'',opts:['Estarei verificando o contrato e o mesmo será devolvido amanhã.','Verificarei o contrato e o devolverei amanhã.','Vou estar verificando o contrato e este será devolvido amanhã.','Verificarei o contrato e o mesmo será devolvido amanhã.'],correct:1,exp:'"Verificarei o contrato e o devolverei amanhã" — sem gerundismo, elipse coesa, sem vício pronominal.'},
{q:'Qual frase acumula mais problemas?',ctx:'',opts:['Estarei verificando a nível de prazo e os mesmos serão comunicados.','Verificarei os prazos e os comunicarei assim que possível.','Como houve atraso, no entanto solicitamos prorrogação do prazo.','Primeiramente analisamos; em seguida identificamos; por fim emitimos o parecer.'],correct:0,exp:'A acumula três vícios: gerundismo, "a nível de" e "os mesmos". C tem apenas um problema (conectivo incoerente).'}
]},{type:'finish',phase:'Conclusão (3 min)'}]}
]},
{id:'rev6',title:'Revisão — Módulos 11 e 12',desc:'Revisão integrada: formalidade, vocabulário e simulado final — 20 minutos.',sessions:[
{id:'rev6s1',day:'Segunda',title:'Revisão F — Parte 1',nq:4,steps:[
{type:'learn',phase:'Revisão (3 min)',html:`<div class="body-txt">Revisão dos módulos 11 e 12: <strong>formalidade</strong>, <strong>vocabulário</strong> e integração geral.</div><div class="rule">Lembre-se:<br>— Sem "a gente", "tá", "pra", "aí", "daí", "tipo" em textos formais.<br>— Deferir = conceder; indeferir = negar.<br>— "Através de" (travessia física) → use "por", "mediante" ou "por meio de".</div>`},
{type:'quiz',phase:'Prática (14 min)',questions:[
{q:'Qual e-mail está em registro formal e sem erros gramaticais?',ctx:'',opts:['Oi, tudo bem? Queria avisar que houveram adiamentos e a mesma será reagendada.','Prezada cliente, informamos que houve adiamentos e a audiência será reagendada.','Olá! Houveram adiamentos e estarei entrando em contato assim que possível.','Prezada cliente, houveram adiamentos mas estaremos entrando em contato.'],correct:1,exp:'Saudação formal, "houve" correto, pronome adequado, sem gerundismo.'},
{q:'Qual frase usa vocabulário profissional com precisão?',ctx:'',opts:['O juiz deferiu o pedido, ou seja, negou a liminar.','O juiz indeferiu o pedido, ou seja, negou a liminar.','O juiz deferiu o pedido e procedemos com a análise.','O juiz deferiu o pedido e procedemos à análise.'],correct:3,exp:'"Deferiu" (= concedeu) e "procedemos à análise" (regência correta de "proceder").'},
{q:'Qual frase reúne formalidade, gramática e coesão corretas?',ctx:'',opts:['A nível de contrato, a mesma foi assinada e estaremos enviando para o cliente.','Quanto ao contrato, ele foi assinado e será enviado ao cliente.','Em termos de contrato, este foi assinado e estaremos enviando ao cliente.','Quanto ao contrato, o mesmo foi assinado e enviaremos ao cliente.'],correct:1,exp:'B elimina todos os vícios: "quanto ao", pronome correto, sem gerundismo, coesão adequada.'},
{q:'Qual é a versão profissional correta?',ctx:'"Daí a gente viu que houveram erros, mais a mesma foi corrigida e estaremos enviando em breve."',opts:['Portanto, identificamos que houve erros, mas eles foram corrigidos e enviaremos em breve.','Portanto, a gente identificou que houve erros, mas os mesmos foram corrigidos e enviaremos.','Assim, identificamos que houveram erros, mas eles foram corrigidos e enviaremos em breve.','Portanto, identificamos que houve erros, mas a mesma foi corrigida e estaremos enviando.'],correct:0,exp:'A corrige todos os 5 problemas: "daí" → "portanto", "a gente" → "identificamos", "houveram" → "houve", "mais" → "mas", "a mesma" → "eles", "estaremos enviando" → "enviaremos".'}
]},{type:'finish',phase:'Conclusão (3 min)'}]},
{id:'rev6s2',day:'Quinta',title:'Revisão F — Simulado integrado final',nq:5,steps:[
{type:'learn',phase:'Revisão (2 min)',html:`<div class="body-txt">Simulado final de revisão — encerramento do programa. As questões integram todos os 12 módulos.</div><div class="rule">Temas cobertos:<br>&#10003; Pronomes · &#10003; Haver · &#10003; Vírgula · &#10003; Concordância · &#10003; Crase<br>&#10003; Regência verbal e nominal · &#10003; Redundâncias · &#10003; Vícios · &#10003; Conectivos · &#10003; Formalidade</div>`},
{type:'quiz',phase:'Simulado final (15 min)',questions:[
{q:'Qual frase está completamente correta?',ctx:'',opts:['Houveram adiamentos e as mesmas partes não compareceram à audiência.','Houve adiamentos e as partes não compareceram à audiência.','Houve adiamentos e as mesmas partes não compareceram a audiência.','Houveram adiamentos e as partes não compareceram à audiência.'],correct:1,exp:'"Houve" (singular impessoal), sem vício pronominal e crase correta.'},
{q:'Qual frase tem crase, regência e concordância corretas?',ctx:'',opts:['Às 14h, a Dra. Ana assistiu a sessão e procedeu com a análise.','Às 14h, a Dra. Ana assistiu à sessão e procedeu à análise.','As 14h, a Dra. Ana assistiu à sessão e procedeu à análise.','Às 14h, a Dra. Ana assistiu à sessão e procedeu com a análise.'],correct:1,exp:'"Às 14h" (hora → crase), "assistiu à sessão" (regência + crase), "procedeu à análise" (regência + crase).'},
{q:'Qual frase reúne formalidade, coesão e gramática corretas?',ctx:'',opts:['Primeiramente, estarei analisando o contrato; portanto, retornarei o contato.','Primeiramente, analisarei o contrato; em seguida, retornarei o contato.','Primeiro, vou estar analisando o contrato, portanto retornarei o contato.','Primeiramente, analisarei o contrato, portanto, retornarei o contato.'],correct:1,exp:'"Analisarei" (sem gerundismo), "em seguida" (sequência — não "portanto").'},
{q:'Quantos erros há neste trecho?',ctx:'"Estarei enviando a documentação a assessora, mais que a mesma está a nível de análise."',opts:['3 erros','4 erros','5 erros','6 erros'],correct:2,exp:'Cinco erros: gerundismo; falta crase (à assessora); "mais" → "mas"; "a mesma" → vício; "a nível de" → vício.'},
{q:'Qual é a versão final mais correta e profissional?',ctx:'"A nível de prazo, houveram adiamentos e a mesma parte não foi apta para comparecer à audiência."',opts:['Quanto ao prazo, houve adiamentos e a mesma parte não estava apta a comparecer à audiência.','Quanto ao prazo, houve adiamentos e a parte não estava apta a comparecer à audiência.','A nível de prazo, houve adiamentos e a parte não estava apta para comparecer à audiência.','Quanto ao prazo, houveram adiamentos e a parte não estava apta a comparecer à audiência.'],correct:1,exp:'B corrige todos: "quanto ao prazo", "houve", "a parte" (sem "a mesma"), "apta a" (regência correta).'}
]},{type:'finish',phase:'Parabéns! Programa concluído.'}]}
]}
];

const SESSION_IDS=MODULES.flatMap(m=>m.sessions.map(s=>s.id));
async function loadUsers(){try{const r=await window.storage.get('pgm_users',true);return r?JSON.parse(r.value):['Emilly','Elizabete'];}catch(e){return['Emilly','Elizabete'];}}
async function loadProgress(){try{const r=await window.storage.get('pgm_progress',true);return r?JSON.parse(r.value):{};} catch(e){return{};}}
async function saveProgress(data){try{await window.storage.set('pgm_progress',JSON.stringify(data),true);}catch(e){}}
let currentUser='',progData={},currentMod=null,currentSessIdx=null,currentStep=0,currentQ=0,answeredQs=[],timerInt=null,timerSec=900;
async function init(){
  progData=await loadProgress();
  const users=await loadUsers();
  const sel=document.getElementById('nameSelect');
  sel.innerHTML='<option value="">Seu nome</option>'+users.map(u=>`<option value="${u}">${u}</option>`).join('');
  renderModules();
}
function setUser(){
  currentUser=document.getElementById('nameSelect').value;
  document.getElementById('info-box').style.display=currentUser?'none':'block';
  const sr=document.getElementById('stats-row');
  if(currentUser){sr.style.display='grid';updateStats();}else sr.style.display='none';
  renderModules();
}
function getUserProg(u){return progData[u]||(progData[u]={sessions:{},scores:{},dates:{}},progData[u]);}
function updateStats(){
  const ud=getUserProg(currentUser);
  const done=SESSION_IDS.filter(id=>ud.sessions[id]).length;
  const scores=Object.values(ud.scores).filter(v=>v!==undefined);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+'%':'—';
  const modsStarted=MODULES.filter(m=>m.sessions.some(s=>ud.sessions[s.id])).length;
  document.getElementById('st-sess').textContent=done;
  document.getElementById('st-avg').textContent=avg;
  document.getElementById('st-mod').textContent=modsStarted+'/'+MODULES.length;
}
function isUnlocked(i){if(i===0)return true;if(!currentUser)return false;const ud=getUserProg(currentUser);return MODULES[i-1].sessions.every(s=>ud.sessions[s.id]);}
function renderModules(){
  const ud=currentUser?getUserProg(currentUser):{sessions:{}};
  document.getElementById('mod-grid').innerHTML=MODULES.map((m,i)=>{
    const unlocked=isUnlocked(i);const done=m.sessions.every(s=>ud.sessions[s.id]);
    const sessD=m.sessions.filter(s=>ud.sessions[s.id]).length;const pct=Math.round((sessD/m.sessions.length)*100);
    const cls='mod-card'+(done?' completed':(!unlocked?' locked':''));
    const badge=done?'<span class="badge bd">Concluído</span>':(!unlocked?'<span class="badge bl">Bloqueado</span>':'<span class="badge bn">Disponível</span>');
    return `<div class="${cls}" onclick="${unlocked?`openMod(${i})`:''}"><div class="mod-num">Módulo ${i+1}</div><div class="mod-title">${m.title}</div><div class="mod-desc">${m.desc}</div><div class="pbw"><div class="pbf ${done?'g':''}" style="width:${pct}%"></div></div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px"><span style="font-size:11px;color:#999">${sessD}/${m.sessions.length} sessões</span>${badge}</div></div>`;
  }).join('');
}
function openMod(i){currentMod=i;document.getElementById('mod-label').textContent=`Módulo ${i+1} — ${MODULES[i].title}`;document.getElementById('mod-sub').textContent=`${MODULES[i].sessions.length} sessões · 15 min cada`;renderSessions();showScreen('screen-sessions');}
function renderSessions(){
  const m=MODULES[currentMod];const ud=currentUser?getUserProg(currentUser):{sessions:{},scores:{}};
  document.getElementById('sess-list').innerHTML=m.sessions.map((s,i)=>{
    const done=ud.sessions[s.id];const locked=i>0&&!ud.sessions[m.sessions[i-1].id];const score=ud.scores[s.id];
    const ic=done?'si-g':(locked?'si-gr':'si-b');const ico=done?'✓':(locked?'🔒':'📖');
    const stCls=done?'badge bd':(locked?'badge bl':'badge bn');
    const stTxt=done?(score!==undefined?score+'% — Feita':'Feita'):(locked?'Aguarde':'Fazer agora');
    return `<div class="si ${done?'sdn':''} ${locked?'slk':''}" onclick="${!locked?`openSess(${i})`:''}"><div class="si-ic ${ic}">${ico}</div><div class="si-info"><div class="si-name">${s.day} — ${s.title}</div><div class="si-meta">15 min · ${s.nq} questões</div></div><span class="si-st ${stCls}">${stTxt}</span></div>`;
  }).join('');
}
function openSess(i){
  currentSessIdx=i;currentStep=0;currentQ=0;answeredQs=[];timerSec=900;clearInterval(timerInt);
  timerInt=setInterval(()=>{timerSec=Math.max(0,timerSec-1);const el=document.getElementById('timer-val');if(el){const m=Math.floor(timerSec/60),s=timerSec%60;el.textContent=`${m}:${s.toString().padStart(2,'0')}`;}},1000);
  document.getElementById('study-title').textContent=MODULES[currentMod].sessions[i].title;
  renderStep();showScreen('screen-study');
}
function renderStep(){
  const s=MODULES[currentMod].sessions[currentSessIdx];
  document.getElementById('step-ind').innerHTML=s.steps.map((_,i)=>`<div class="sd ${i<currentStep?'dn':(i===currentStep?'act':'')}"></div>`).join('');
  const step=s.steps[currentStep];const area=document.getElementById('study-area');const nav=document.getElementById('study-nav');
  if(step.type==='learn'){
    area.innerHTML=`<div class="card"><div class="phase-lbl">${step.phase}</div>${step.html}</div>`;
    nav.innerHTML=`<button class="btn-p" onclick="nextStep()">Ir para os exercícios →</button>`;
  }else if(step.type==='quiz'){currentQ=0;answeredQs=[];renderQ(step,area,nav);}
  else{
    clearInterval(timerInt);
    const totalQ=s.steps.filter(x=>x.type==='quiz').reduce((a,x)=>a+x.questions.length,0);
    const correct=answeredQs.filter(Boolean).length;const pct=totalQ>0?Math.round((correct/totalQ)*100):100;
    const ud=getUserProg(currentUser);ud.sessions[s.id]=true;ud.scores[s.id]=pct;ud.dates=ud.dates||{};ud.dates[s.id]=new Date().toISOString();
    saveProgress(progData);
    const col=pct>=80?'#166534':(pct>=60?'#92400E':'#991B1B');
    const msg=pct>=80?'Ótimo trabalho! Você está dominando o conteúdo.':(pct>=60?'Bom resultado! Revise os pontos com erro.':'Continue praticando — a consistência é o caminho.');
    area.innerHTML=`<div class="fin-card"><div class="fin-score" style="color:${col}">${pct}%</div><div class="fin-lbl">${correct}/${totalQ} questões corretas</div><div class="fin-msg">${msg}</div></div>`;
    nav.innerHTML=`<button class="btn-s" onclick="goSessions()">Voltar</button><button class="btn-p" onclick="goHome()">Ver módulos</button>`;
    updateStats();renderSessions();
  }
}
function renderQ(step,area,nav){
  const q=step.questions[currentQ];
  area.innerHTML=`<div class="card"><div class="phase-lbl">${step.phase} — questão ${currentQ+1} de ${step.questions.length}</div>${q.ctx?`<div class="q-ctx">${q.ctx}</div>`:''}<div class="q-txt">${q.q}</div><div class="q-opts">${q.opts.map((o,i)=>`<button class="qo" onclick="answerQ(${i})" id="qo${i}">${o}</button>`).join('')}</div><div class="qfb" id="qfb"></div></div>`;
  nav.innerHTML=`<button class="btn-p" id="qnxt" onclick="nextQ()" style="display:none">${currentQ<step.questions.length-1?'Próxima →':'Concluir →'}</button>`;
}
function answerQ(idx){
  const step=MODULES[currentMod].sessions[currentSessIdx].steps[currentStep];const q=step.questions[currentQ];
  if(answeredQs[currentQ]!==undefined)return;answeredQs[currentQ]=(idx===q.correct);
  document.querySelectorAll('.qo').forEach(o=>o.disabled=true);
  document.getElementById('qo'+q.correct).classList.add('qok');
  if(idx!==q.correct)document.getElementById('qo'+idx).classList.add('qwrong');
  const fb=document.getElementById('qfb');fb.className='qfb show '+(idx===q.correct?'fb-ok':'fb-err');
  fb.innerHTML=`<div class="fb-t">${idx===q.correct?'Correto!':'Não exatamente.'}</div>${q.exp}`;
  const nxt=document.getElementById('qnxt');if(nxt)nxt.style.display='block';
}
function nextQ(){currentQ++;const step=MODULES[currentMod].sessions[currentSessIdx].steps[currentStep];if(currentQ>=step.questions.length)nextStep();else renderQ(step,document.getElementById('study-area'),document.getElementById('study-nav'));}
function nextStep(){currentStep++;renderStep();}
function goHome(){clearInterval(timerInt);renderModules();showScreen('screen-home');}
function goSessions(){clearInterval(timerInt);renderSessions();showScreen('screen-sessions');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
init();
</script>
</body>
</html>
