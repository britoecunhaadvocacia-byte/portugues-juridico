<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programa de Português Jurídico — Estagiárias</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.shell{max-width:680px;margin:0 auto;padding:24px 16px}
.topbar{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:15px;font-weight:600;color:#1a1a1a}
.topbar p{font-size:12px;color:#777;margin-top:2px}
select{font-size:13px;padding:5px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer}
.screen{display:none}.screen.active{display:block}
.info-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#1E40AF;text-align:center}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mod-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s}
.mod-card:hover:not(.locked){border-color:#93C5FD}
.mod-card.locked{opacity:.5;cursor:not-allowed}
.mod-card.completed{border-color:#86EFAC}
.mod-num{font-size:11px;color:#999;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.mod-title{font-size:13.5px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.mod-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:6px}
.pbw{height:4px;background:#eee;border-radius:4px;overflow:hidden;margin-top:6px}
.pbf{height:100%;border-radius:4px;background:#60A5FA;transition:width .4s}
.pbf.g{background:#4ADE80}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.bd{background:#DCFCE7;color:#166534}.bn{background:#EFF6FF;color:#1E40AF}.bl{background:#F5F5F5;color:#999}
.back-btn{background:none;border:none;font-size:13px;color:#2563EB;cursor:pointer;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:4px}
.sess-hdr{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 16px;margin-bottom:12px}
.sess-hdr h2{font-size:14px;font-weight:600;color:#1E40AF}
.sess-hdr p{font-size:12px;color:#3B82F6;margin-top:2px}
.sess-list{display:flex;flex-direction:column;gap:8px}
.si{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.si:hover:not(.slk){border-color:#93C5FD}
.si.slk{opacity:.5;cursor:not-allowed}
.si.sdn{border-color:#86EFAC}
.si-ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.si-b{background:#EFF6FF;color:#2563EB}.si-g{background:#DCFCE7;color:#16A34A}.si-gr{background:#F5F5F5;color:#999}
.si-info{flex:1}
.si-name{font-size:13.5px;font-weight:500;color:#1a1a1a}
.si-meta{font-size:12px;color:#777;margin-top:2px}
.si-st{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0}
.study-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.study-title{font-size:14px;font-weight:600;color:#1a1a1a}
.timer{font-size:12px;color:#777;display:flex;align-items:center;gap:4px}
.timer span{font-weight:600;color:#1a1a1a}
.step-ind{display:flex;gap:5px;margin-bottom:12px}
.sd{height:4px;flex:1;border-radius:4px;background:#eee;transition:background .3s}
.sd.act{background:#60A5FA}.sd.dn{background:#4ADE80}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:12px}
.phase-lbl{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.body-txt{font-size:13.5px;color:#555;line-height:1.75}
.body-txt strong{color:#1a1a1a;font-weight:600}
.rule{background:#EFF6FF;border-left:3px solid #2563EB;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#1E40AF;margin:10px 0;line-height:1.6}
.warn{background:#FFFBEB;border-left:3px solid #D97706;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#92400E;margin:10px 0;line-height:1.6}
.erb{display:flex;gap:8px;align-items:flex-start;margin:5px 0;font-size:13px}
.bk{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.bk-ok{background:#DCFCE7;color:#166534}.bk-err{background:#FEE2E2;color:#991B1B}
.et{color:#1a1a1a;line-height:1.6}
.rdb{background:#FEE2E2;border:1px solid #FECACA;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;color:#991B1B;line-height:1.65}
.rdb strong{color:#7F1D1D;font-weight:600}
.grb{background:#DCFCE7;border:1px solid #BBF7D0;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:13px;color:#166534;line-height:1.65}
.grb strong{color:#14532D;font-weight:600}
.ann{font-size:11px;color:#aaa;margin-top:3px}
.div{height:1px;background:#f0f0f0;margin:12px 0}
.q-ctx{background:#F9FAFB;border-radius:8px;padding:9px 12px;font-size:13px;color:#1a1a1a;margin-bottom:10px;border-left:2px solid #ddd;line-height:1.6}
.q-txt{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:10px;line-height:1.5}
.q-opts{display:flex;flex-direction:column;gap:7px}
.qo{background:#F9FAFB;border:1px solid #e5e5e5;border-radius:8px;padding:10px 13px;font-size:13px;color:#1a1a1a;cursor:pointer;text-align:left;transition:background .15s;line-height:1.5;font-family:inherit}
.qo:hover:not(:disabled){background:#EFF6FF;border-color:#93C5FD}
.qo.qok{background:#DCFCE7;border-color:#86EFAC;color:#166534;font-weight:600}
.qo.qwrong{background:#FEE2E2;border-color:#FECACA;color:#991B1B}
.qo:disabled{cursor:default}
.qfb{margin-top:8px;padding:10px 13px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.qfb.show{display:block}
.fb-ok{background:#DCFCE7;border:1px solid #BBF7D0;color:#166534}
.fb-err{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B}
.fb-t{font-weight:600;margin-bottom:3px}
.nav-row{display:flex;gap:8px;margin-top:12px}
.btn-p{flex:1;padding:10px;background:#EFF6FF;border:1px solid #93C5FD;border-radius:8px;color:#1E40AF;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-p:hover{background:#DBEAFE}
.btn-s{padding:10px 16px;background:#F9FAFB;border:1px solid #e5e5e5;border-radius:8px;color:#777;font-size:13px;cursor:pointer;font-family:inherit}
.fin-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:2rem;text-align:center}
.fin-score{font-size:48px;font-weight:700}
.fin-lbl{font-size:13px;color:#777;margin-bottom:1rem}
.fin-msg{font-size:14px;color:#1a1a1a;margin-bottom:1.5rem;line-height:1.6}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
  <div><h1>&#9878; Português jurídico</h1><p>Segunda e quinta &middot; 15 min por sessão</p></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:12px;color:#777">Olá,</span>
    <select id="nameSelect" onchange="setUser()"><option value="">Seu nome</option></select>
  </div>
</div>
<div id="screen-home" class="screen active">
  <div id="info-box" class="info-box">Selecione seu nome acima para continuar de onde parou.</div>
  <div id="stats-row" style="display:none;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="st-sess">0</div><div style="font-size:11px;color:#777">sessões feitas</div></div>
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="st-avg">—</div><div style="font-size:11px;color:#777">média de acertos</div></div>
    <div style="background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:700" id="st-mod">0/12</div><div style="font-size:11px;color:#777">módulos iniciados</div></div>
  </div>
  <div id="mod-grid" class="mod-grid"></div>
</div>
<div id="screen-sessions" class="screen">
  <button class="back-btn" onclick="goHome()">&#8592; Módulos</button>
  <div class="sess-hdr"><h2 id="mod-label"></h2><p id="mod-sub"></p></div>
  <div class="sess-list" id="sess-list"></div>
</div>
<div id="screen-study" class="screen">
  <button class="back-btn" onclick="goSessions()">&#8592; Sessões</button>
  <div class="study-nav">
    <div class="study-title" id="study-title"></div>
    <div class="timer">&#9200; <span id="timer-val">15:00</span></div>
  </div>
  <div class="step-ind" id="step-ind"></div>
  <div id="study-area"></div>
  <div class="nav-row" id="study-nav"></div>
</div>
</div>
<script>
const STORAGE_KEY='pgm_users';
const PROG_KEY='pgm_progress';
const MODULES=[
{id:'m1',title:'Pronomes e substituição',desc:'Erros com "a mesma", "este/essa" e pronomes pessoais em textos jurídicos.',sessions:[
{id:'m1s1',day:'Segunda',title:'O vício de "a mesma"',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">"A mesma", "o mesmo" e variações usadas para <strong>retomar pessoa ou coisa</strong> já citada são vícios de linguagem — uso pronominal inadequado, inadmissível em textos jurídicos.</div><div class="rule">Para retomar pessoa ou coisa, use o pronome pessoal (ela, ele, eles, elas) ou repita o substantivo se houver ambiguidade.</div><div class="rdb"><strong>Caso real:</strong> "Fui à vara e a servidora me informou que irá repassar meu pedido para a assessora, mais que <strong>a mesma</strong> está de férias."</div><div class="grb"><strong>Correto:</strong> "...mas que <strong>ela</strong> está de férias." — "ela" retoma "a assessora".</div><div class="div"></div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Protocolei a petição e <strong>a mesma</strong> foi juntada aos autos.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Protocolei a petição e <strong>ela</strong> foi juntada aos autos.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Contatei o Dr. Marcos e <strong>o mesmo</strong> confirmou o prazo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Contatei o Dr. Marcos e <strong>ele</strong> confirmou o prazo.</span></div><div class="rule" style="margin-top:10px"><strong>Quando "mesmo/a" está correto:</strong> como pronome enfático ou adjetivo.<br>— "A juíza <strong>mesma</strong> assinou o despacho." (= em pessoa)<br>— "Retorne no <strong>mesmo</strong> dia." (= idêntico)</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual a substituição correta?',ctx:'Entrei em contato com a assessora e a mesma pediu mais prazo.',opts:['...e ela pediu mais prazo.','...e esta pediu mais prazo.','...e a própria pediu mais prazo.','...e a tal pediu mais prazo.'],correct:0,exp:'"Ela" é o pronome pessoal correto para retomar "a assessora". As outras opções repetem o vício ou criam construções igualmente inadequadas.'},
{q:'Qual frase está correta?',ctx:'',opts:['Recebi a decisão e a mesma foi favorável.','Recebi a decisão e ela foi favorável.','Recebi a decisão e esta foi favorável.','Recebi a decisão e a própria foi favorável.'],correct:1,exp:'"Ela" retoma "a decisão" corretamente. "A mesma" e "a própria" são vícios. "Esta" é demonstrativo de posição, não substituto de substantivo.'},
{q:'Em qual frase "mesmo" está correto?',ctx:'',opts:['Liguei para o cartório e o mesmo informou o prazo.','O juiz proferiu a sentença e o mesmo intimou as partes.','Assine no mesmo dia em que receber a intimação.','Protocole o recurso e o mesmo será autuado.'],correct:2,exp:'"No mesmo dia" usa "mesmo" como adjetivo (= idêntico). Nas demais, "o mesmo" substitui indevidamente pessoa ou coisa já citada.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m1s2',day:'Quinta',title:'Este, esse e ela — onde cada um vai',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Usar "esta", "esse", "este" para retomar uma pessoa nomeada é erro equivalente ao "a mesma". Pronomes demonstrativos <strong>localizam no espaço ou no texto</strong> — não substituem pronomes pessoais.</div><div class="rule"><strong>Para retomar pessoa → ele / ela / eles / elas</strong><br><strong>Para coisa próxima ou presente → este / esta</strong><br><strong>Para coisa já citada antes → esse / essa</strong></div><div class="rdb"><strong>Caso real:</strong> "...e que <strong>esta</strong>, só retorna das férias na segunda." (referindo-se à assessora nomeada)</div><div class="grb"><strong>Correto:</strong> "...e que <strong>ela</strong> só retorna das férias na segunda."</div><div class="div"></div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Falei com a promotora e <strong>esta</strong> pediu mais prazo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Falei com a promotora e <strong>ela</strong> pediu mais prazo.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-ok">Certo</span><span class="et">Recebi dois recursos: <strong>este</strong> é do réu, <strong>aquele</strong> é do MP. <em style="color:#999">(posição no texto)</em></span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Encaminhe <strong>esta</strong> petição à vara. <em style="color:#999">(documento em mãos)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase usa o pronome correto?',ctx:'A Dra. Renata assinou o despacho e ___ encaminhou ao cartório.',opts:['...e esta encaminhou ao cartório.','...e essa encaminhou ao cartório.','...e ela encaminhou ao cartório.','...e a mesma encaminhou ao cartório.'],correct:2,exp:'"Ela" retoma "a Dra. Renata". Demonstrativos (esta, essa) localizam coisas no espaço ou texto, não pessoas.'},
{q:'Onde "esta" está sendo usado corretamente?',ctx:'',opts:['Liguei para a escrivã e esta confirmou o horário.','Esta petição deve ser juntada aos autos imediatamente.','O juiz saiu e esta voltará amanhã.','Falei com a testemunha e esta estava nervosa.'],correct:1,exp:'"Esta petição" usa o demonstrativo para indicar documento presente. Nas demais, "esta" substitui indevidamente uma pessoa — o correto seria "ela".'},
{q:'Qual alternativa reescreve corretamente a frase?',ctx:'O escrivão recebeu a petição e o mesmo a encaminhou à assessora.',opts:['O escrivão recebeu a petição e este a encaminhou à assessora.','O escrivão recebeu a petição e ele a encaminhou à assessora.','O escrivão recebeu e a encaminhou à assessora ele mesmo.','O escrivão recebeu a petição e a própria a encaminhou à assessora.'],correct:1,exp:'"Ele" retoma "o escrivão" de forma simples e correta.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m2',title:'Verbo haver',desc:'Impessoalidade, tempo decorrido e a diferença com "existir".',sessions:[
{id:'m2s1',day:'Segunda',title:'Haver: existência e impessoalidade',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Quando "haver" significa <strong>existir ou ocorrer</strong>, é impessoal — não tem sujeito e fica <strong>sempre no singular</strong>. É o erro mais grave com esse verbo.</div><div class="rule"><strong>Haver = existir → sempre singular.</strong> Nunca "houveram", "haviam", "havem".</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et"><strong>Houveram</strong> muitos adiamentos de audiência neste mês.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Houve</strong> muitos adiamentos de audiência neste mês.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et"><strong>Haviam</strong> pendências na pauta desta semana.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Havia</strong> pendências na pauta desta semana.</span></div><div class="div"></div><div class="warn">"Existir" não é impessoal — concorda normalmente com o sujeito.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et"><strong>Existe</strong> pendências no processo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Existem</strong> pendências no processo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Há</strong> pendências no processo. <em style="color:#999">(haver = impessoal, singular)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Assinale a frase correta:',ctx:'',opts:['Houveram muitos erros no relatório encaminhado ao cliente.','Haviam processos urgentes que precisavam de atenção imediata.','Houve muitos erros no relatório encaminhado ao cliente.','Haviam muita confusão com os prazos processuais.'],correct:2,exp:'"Haver" com sentido de existir ou ocorrer é impessoal — sempre singular: houve, havia, haverá. Nunca "houveram" ou "haviam" nesse sentido.'},
{q:'Qual frase usa "existir" e "haver" corretamente?',ctx:'',opts:['Existe pendências processuais a resolver.','Há pendências processuais a resolver.','Existem pendência processuais a resolver.','Havem pendências processuais a resolver.'],correct:1,exp:'"Há pendências" — haver impessoal, correto. "Existem pendências" também estaria certo. "Havem" não existe na norma culta.'},
{q:'Qual alternativa está errada?',ctx:'',opts:['Haverá audiência na próxima semana.','Havia dúvidas sobre a competência territorial.','Houveram adiamentos por ausência das partes.','Há processos sem movimentação há mais de 90 dias.'],correct:2,exp:'"Houveram adiamentos" está errado. Haver impessoal não vai para o plural: o correto é "Houve adiamentos".'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m2s2',day:'Quinta',title:'Haver de tempo — "há dois anos" ou "haviam"?',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Quando "haver" (ou "fazer") indica <strong>tempo decorrido</strong>, também é impessoal — sempre no singular, independentemente do número que vem depois.</div><div class="rule"><strong>Presente:</strong> há / faz + período<br><strong>Passado:</strong> havia / fazia + período<br>Nunca: "haviam dois anos", "fazem três meses"</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">O processo está parado <strong>haviam</strong> três meses.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O processo está parado <strong>há</strong> três meses.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">A sentença foi proferida <strong>fazem</strong> dois anos.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A sentença foi proferida <strong>faz</strong> dois anos.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">O cliente aguarda retorno <strong>haviam</strong> mais de 30 dias.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O cliente aguarda retorno <strong>há</strong> mais de 30 dias.</span></div><div class="warn" style="margin-top:10px">Nunca use "há... atrás" — é redundante. "Há dois anos atrás" está errado. O correto é "há dois anos".</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Como indicar corretamente o tempo decorrido?',ctx:'O réu está foragido ___ seis meses.',opts:['...haviam seis meses.','...fazem seis meses.','...há seis meses.','...houveram seis meses.'],correct:2,exp:'"Há seis meses" — haver impessoal no presente para tempo decorrido. Sempre no singular.'},
{q:'Qual frase está correta?',ctx:'',opts:['Faz dois anos que a ação tramita sem resolução.','Fazem dois anos que a ação tramita sem resolução.','Haviam dois anos que a ação tramitava sem resolução.','Houveram dois anos de tramitação sem resolução.'],correct:0,exp:'"Faz dois anos" — "fazer" indicando tempo decorrido é impessoal, sempre no singular.'},
{q:'Qual frase usa "há" corretamente?',ctx:'',opts:['Há dois anos atrás, o contrato foi firmado.','O mandado foi expedido há uma semana.','Há muitos anos atrás isso era diferente.','Há três dias atrás a intimação chegou.'],correct:1,exp:'"Há uma semana" está correto. As demais usam "há... atrás" — redundante e errado.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m3',title:'Vírgula e pontuação',desc:'Sujeito e verbo, apostos, "mas/mais", dois-pontos e ponto e vírgula.',sessions:[
{id:'m3s1',day:'Segunda',title:'Vírgula: o que nunca se separa',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt"><strong>Nunca coloque vírgula entre sujeito e verbo.</strong> É o erro mais grave e mais comum nas comunicações internas.</div><div class="rdb"><strong>Caso real:</strong> "A servidora Juliana<strong>,</strong> me informou que o processo já está na lista da assessora..."<br><span class="ann">→ "Juliana" faz parte do sujeito. A vírgula o separa do verbo "informou".</span></div><div class="grb"><strong>Correto:</strong> "A servidora Juliana me informou que o processo está na lista da assessora..."</div><div class="rule"><strong>Aposto especificativo</strong> (identifica qual): sem vírgulas.<br>Ex.: "A advogada <strong>Carla</strong> entrou com o recurso."<br><strong>Aposto explicativo</strong> (acrescenta informação): com vírgulas.<br>Ex.: "A Dra. Carla, <em>defensora do réu</em>, entrou com o recurso."</div><div class="div"></div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Fui ao escritório, e a recepcionista me atendeu. <em style="color:#999">(sequência simples)</em></span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Fui ao escritório e a recepcionista me atendeu.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-ok">Certo</span><span class="et">Quando a decisão for publicada, avisarei o cliente. <em style="color:#999">(oração anteposta ao verbo principal)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Por que a vírgula após "Juliana" está errada?',ctx:'"A servidora Juliana, me informou que o processo está na lista."',opts:['Porque vírgula nunca vem antes de verbo em qualquer situação.','Porque "Juliana" é aposto especificativo — parte do sujeito — e não deve ser separada do verbo.','Porque o nome próprio não precisa de pontuação.','Porque falta outra vírgula no final da frase.'],correct:1,exp:'"Juliana" especifica qual servidora — é aposto especificativo, parte do sujeito. Nunca se separa sujeito do verbo com vírgula. Se fosse explicativo ("a servidora, veterana de 20 anos, ..."), aí sim levaria vírgulas duplas.'},
{q:'Qual frase usa a vírgula corretamente?',ctx:'',opts:['O advogado responsável pelo caso, solicitou prazo adicional.','O réu, representado pelo Dr. Figueiredo, compareceu à audiência.','A decisão, foi publicada ontem no Diário Oficial.','O processo, tramita sem movimentação há três meses.'],correct:1,exp:'"Representado pelo Dr. Figueiredo" é aposto explicativo — informação adicional removível. Deve ser isolado por vírgulas. Nas demais, a vírgula separa sujeito do verbo.'},
{q:'Qual está sem vírgula corretamente?',ctx:'',opts:['Quando o prazo vencer avisarei o cliente.','A juíza, assinou o despacho ontem.','Fui ao cartório e a servidora me atendeu prontamente.','Protocolei o recurso, e ele foi autuado.'],correct:2,exp:'"Fui ao cartório e a servidora me atendeu" — sem vírgula antes do "e" em sequência simples. A opção A precisa de vírgula após oração anteposta (obrigatória).'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m3s2',day:'Quinta',title:'"Mais" ou "mas"? Dois-pontos e ponto e vírgula',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Confundir "mais" com "mas" é erro ortográfico inadmissível em textos profissionais.</div><div class="rule"><strong>Mas</strong> = porém, contudo, entretanto (conjunção adversativa)<br><strong>Mais</strong> = quantidade, adição (advérbio ou adjetivo)</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">A assessora recebeu o pedido, <strong>mais</strong> está de férias.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A assessora recebeu o pedido, <strong>mas</strong> está de férias.</span></div><div class="div"></div><div class="warn">Não use dois-pontos após preposição ou imediatamente após verbo transitivo.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">O recurso consiste em: alegações de fato e de direito.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O recurso consiste em dois fundamentos: alegações de fato e de direito.</span></div><div class="div"></div><div class="body-txt"><strong>Ponto e vírgula — quando usar:</strong></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A Dra. Ana ficou com os contratos; o Dr. Pedro, com as ações trabalhistas; a Dra. Carla, com os processos cíveis.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase está graficamente correta?',ctx:'',opts:['Tentei falar com o cartório, mais a linha estava ocupada.','A petição foi protocolada, mas o prazo já havia vencido.','Consultei o sistema, mais o processo não aparecia.','Liguei para o escritório, mais a secretária não atendeu.'],correct:1,exp:'"Mas" é a conjunção adversativa correta (= porém). "Mais" é advérbio de quantidade — confundi-los é erro ortográfico grave.'},
{q:'Onde os dois-pontos são usados corretamente?',ctx:'',opts:['O recurso consiste em: alegações de fato e de direito.','O recurso apresenta dois fundamentos: alegações de fato e de direito.','O réu alega: inocência e álibi comprovado.','A defesa consiste em: provar o álibi.'],correct:1,exp:'Os dois-pontos anunciam enumeração após sentido completo. Nunca após preposição ("em:") ou interrompendo relação verbo-complemento.'},
{q:'Qual usa o ponto e vírgula corretamente?',ctx:'',opts:['A juíza saiu; e voltará amanhã cedo.','A Dra. Ana ficou com os contratos; o Dr. Pedro, com os trabalhistas; a Dra. Carla, com os cíveis.','Precisamos de: certidão; procuração; e RG.','O prazo venceu; mas a petição não foi entregue.'],correct:1,exp:'Ponto e vírgula é ideal para separar itens paralelos longos que já têm vírgulas internas. Nas demais, é usado onde bastaria vírgula simples.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m4',title:'Concordância verbal e nominal',desc:'Sujeito distante, particípios, "em anexo" e outros erros frequentes em comunicações profissionais.',sessions:[
{id:'m4s1',day:'Segunda',title:'Concordância verbal — sujeito distante',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">O verbo concorda com o <strong>sujeito</strong>, não com palavras próximas. Localize o núcleo do sujeito antes de conjugar.</div><div class="rule">Identifique o núcleo do sujeito → conjugue o verbo de acordo com ele, não com o substantivo mais próximo.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">A lista de pendências <strong>foram</strong> encaminhadas ao cliente.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A lista de pendências <strong>foi</strong> encaminhada ao cliente. <em style="color:#999">(sujeito: "a lista")</em></span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">O conjunto de documentos <strong>foram</strong> juntados aos autos.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O conjunto de documentos <strong>foi</strong> juntado aos autos.</span></div><div class="div"></div><div class="body-txt"><strong>"Se" apassivador — verbo concorda com o sujeito paciente:</strong></div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Aluga-se salas no edifício sede.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Alugam-se salas no edifício sede. <em style="color:#999">("salas" é o sujeito → plural)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase tem concordância correta?',ctx:'',opts:['A cópia dos documentos foram entregues ao cliente.','A maioria dos réus compareceram à audiência.','O conjunto de petições foi encaminhado ao tribunal.','O grupo de advogados solicitaram prazo adicional.'],correct:2,exp:'"O conjunto" é o sujeito (singular), portanto "foi encaminhado". Nas demais, os núcleos dos sujeitos são igualmente singulares: "a cópia", "a maioria", "o grupo".'},
{q:'Assinale a alternativa com "se" apassivador correta:',ctx:'',opts:['Aluga-se salas comerciais no edifício.','Alugam-se salas comerciais no edifício.','Vende-se imóveis na planta.','Contrata-se estagiários de direito.'],correct:1,exp:'Com "se" apassivador, o verbo concorda com o sujeito paciente: "salas" é plural, logo "alugam-se".'},
{q:'Qual frase está errada?',ctx:'',opts:['A decisão foi reformada pelo tribunal.','As alegações finais foram apresentadas no prazo.','O rol de testemunhas foram deferido pelo juiz.','Os embargos de declaração foram opostos em tempo.'],correct:2,exp:'"O rol" é o sujeito (singular masculino): "O rol de testemunhas foi deferido". O verbo errou ao ir para o plural concordando com "testemunhas".'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m4s2',day:'Quinta',title:'Concordância nominal — adjetivos, particípios e expressões fixas',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Artigos, adjetivos e particípios concordam em <strong>gênero e número</strong> com o substantivo a que se referem.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">As análises foram realizados pela equipe de compliance.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">As análises foram realizadas pela equipe de compliance.</span></div><div class="rule"><strong>"Obrigado/a"</strong> concorda com quem fala: mulher diz "obrigada".<br><strong>"Em anexo"</strong> é locução adverbial — invariável.<br><strong>"Anexo/a"</strong> usado como adjetivo — concorda com o substantivo.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Seguem em anexas as certidões.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Seguem em anexo as certidões. <em style="color:#999">("em anexo" é invariável)</em></span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Seguem anexas as certidões. <em style="color:#999">("anexas" concorda com "certidões")</em></span></div><div class="warn" style="margin-top:10px">Adjetivo referindo-se a dois substantivos de gêneros diferentes → masculino plural.<br>"O contrato e a proposta estão <strong>prontos</strong> para assinatura."</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual alternativa está correta?',ctx:'',opts:['Seguem em anexas as certidões solicitadas.','Seguem em anexo as certidões solicitadas.','Seguem anexo as certidões solicitadas.','Segue em anexos as certidões solicitadas.'],correct:1,exp:'"Em anexo" é locução adverbial e não varia. "Seguem em anexo as certidões" está correto. Também seria correto: "Seguem anexas as certidões".'},
{q:'Qual frase tem concordância nominal correta?',ctx:'',opts:['O contrato e a ata foram entregue ao cliente.','A sentença e o acórdão foram publicados na mesma data.','As partes ficaram satisfeito com o acordo.','A defesa e a acusação foi ouvidas pelo juiz.'],correct:1,exp:'"O contrato e a ata" — dois substantivos (masc. + fem.) → adjetivo vai para o masculino plural: "publicados".'},
{q:'Uma profissional encerra um e-mail. Qual está correto?',ctx:'',opts:['Obrigado pela atenção dispensada.','Obrigada pela atenção dispensada.','Grato pela atenção dispensada.','Agradecido pela atenção dispensada.'],correct:1,exp:'"Obrigada" — obrigado/a concorda com o gênero de quem fala. Uma mulher usa a forma feminina.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m5',title:'Crase',desc:'Quando usar, quando não usar e os casos que mais geram dúvida em textos profissionais.',sessions:[
{id:'m5s1',day:'Segunda',title:'Crase: a regra fundamental',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Crase é a <strong>fusão da preposição "a" com o artigo "a"</strong>. Só ocorre diante de palavras femininas que admitem o artigo "a".</div><div class="rule"><strong>Teste prático:</strong> substitua a palavra feminina por uma masculina equivalente. Se usar "ao", a palavra feminina leva crase. Se usar "a" sem artigo, não leva.<br><br>"Encaminhei o processo <strong>à</strong> assessora." → "Encaminhei o processo <strong>ao</strong> assessor." ✓ crase.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Encaminhei o documento a assessora.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Encaminhei o documento <strong>à</strong> assessora.</span></div><div class="div"></div><div class="body-txt"><strong>Não se usa crase antes de:</strong></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Encaminhar <strong>a</strong> petição ao juiz. <em style="color:#999">(artigo antes de substantivo sem preposição)</em></span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Enviei <strong>a</strong> ela o e-mail. <em style="color:#999">(pronome pessoal — nunca leva crase)</em></span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Faremos isso <strong>a</strong> partir de segunda. <em style="color:#999">("a partir de" — expressão fixa)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase usa a crase corretamente?',ctx:'',opts:['Encaminhei o processo à ela para revisão.','Encaminhei o processo à assessora para revisão.','Encaminhei o processo a Dra. para revisão.','Encaminhei o processo a reunião de amanhã.'],correct:1,exp:'"À assessora" — preposição "a" + artigo "a" antes de substantivo feminino. Nunca se usa crase antes de pronomes pessoais ("ela", "você").'},
{q:'Em qual frase a crase está corretamente ausente?',ctx:'',opts:['Encaminhe o documento a secretaria.','Compareci a audiência no horário marcado.','Enviei o e-mail a ela ontem.','Fui a vara protocolar a petição.'],correct:2,exp:'"Enviei o e-mail a ela" — pronomes pessoais nunca levam crase. Nas demais, falta crase: "à secretaria", "à audiência", "à vara".'},
{q:'Qual alternativa está correta?',ctx:'',opts:['Às 14h compareça à sala de reuniões.','A partir à amanhã o prazo estará vencido.','Encaminhe à ela o documento assinado.','A cliente referiu-se à você na reclamação.'],correct:0,exp:'"Às 14h" (hora feminina → crase obrigatória) e "à sala" (preposição + artigo). As demais erram: "a partir de" é expressão fixa sem crase, e pronomes pessoais nunca levam crase.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m5s2',day:'Quinta',title:'Crase: casos especiais e armadilhas',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Além da regra geral, há casos específicos que geram dúvida frequente.</div><div class="rule"><strong>Horas → sempre crase:</strong> "às 9h", "às 14h30", "à meia-noite"<br><strong>Expressões adverbiais femininas → crase:</strong> "à tarde", "à noite", "às vezes", "à toa"<br><strong>Nomes de cidades → só se admitir artigo:</strong> "Fui à Recife" (errado — Recife não usa artigo). "Fui ao Rio" (correto).</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">A audiência está marcada as 10h de amanhã.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A audiência está marcada <strong>às</strong> 10h de amanhã.</span></div><div class="div"></div><div class="warn">Locuções prepositivas femininas levam crase: "à luz de", "à margem de", "à disposição de".<br>"O processo ficou <strong>à</strong> disposição das partes."</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">O advogado ficou a disposição do cliente.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O advogado ficou <strong>à</strong> disposição do cliente.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase usa crase corretamente?',ctx:'',opts:['A reunião foi marcada as 15h de sexta-feira.','A reunião foi marcada às 15h de sexta-feira.','A reunião foi marcada à 15h de sexta-feira.','A reunião foi marcada á 15h de sexta-feira.'],correct:1,exp:'"Às 15h" — antes de hora, a crase é sempre obrigatória. Usa-se "às" (plural) para horas no plural e "à" para hora singular ("à meia-noite").'},
{q:'Qual alternativa está correta?',ctx:'',opts:['Os documentos ficaram a disposição do cliente.','Os documentos ficaram à disposição do cliente.','Os documentos ficaram à disposição à ela.','Os documentos ficaram as disposição do cliente.'],correct:1,exp:'"À disposição" — locução prepositiva feminina que exige crase. Sempre: "à disposição de", "à luz de", "à margem de".'},
{q:'Em qual frase a crase está errada?',ctx:'',opts:['Às vezes o prazo é prorrogado.','A reunião acontecerá à tarde.','Fui à Brasília entregar os documentos.','O processo chegou à mão do cliente.'],correct:2,exp:'"Fui à Brasília" está errado — Brasília não usa artigo definido, portanto não há fusão e não há crase. O correto é "Fui a Brasília". Compare: "Fui ao Rio" (correto, pois "o Rio" usa artigo).'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m6',title:'Regência verbal',desc:'Quais preposições cada verbo exige — os erros mais comuns em e-mails e petições.',sessions:[
{id:'m6s1',day:'Segunda',title:'Regência verbal — os verbos que mais erram',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Regência verbal é a relação entre o verbo e seus complementos. Cada verbo exige (ou dispensa) uma preposição específica. Usá-la errada ou omiti-la muda o sentido e compromete o texto.</div><div class="rule">Os verbos mais problemáticos no dia a dia profissional:<br><strong>Assistir</strong> (ver) → a: "assistiu <strong>à</strong> audiência"<br><strong>Visar</strong> (objetivar) → a: "visa <strong>a</strong> resolver o problema"<br><strong>Obedecer</strong> → a: "obedece <strong>às</strong> normas"<br><strong>Informar</strong> (algo a alguém) → objeto direto + indireto</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">A cliente assistiu a audiência sem representação.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A cliente assistiu <strong>à</strong> audiência sem representação.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">A medida visa resolver o impasse contratual.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A medida visa <strong>a</strong> resolver o impasse contratual.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Informei o cliente sobre o prazo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Informei <strong>o</strong> cliente <strong>do</strong> prazo. / Informei <strong>ao</strong> cliente o prazo.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase tem regência correta?',ctx:'',opts:['O réu assistiu a sessão de julgamento.','O réu assistiu à sessão de julgamento.','O réu assistiu na sessão de julgamento.','O réu assistiu em sessão de julgamento.'],correct:1,exp:'"Assistir" com sentido de presenciar é transitivo indireto e exige a preposição "a": "assistiu à sessão" (a + a = à).'},
{q:'Qual frase usa "visar" corretamente?',ctx:'',opts:['A cláusula visa garantir os direitos do contratante.','A cláusula visa a garantir os direitos do contratante.','A cláusula visa em garantir os direitos do contratante.','A cláusula visa de garantir os direitos do contratante.'],correct:1,exp:'"Visar" com sentido de objetivar/ter como meta exige a preposição "a": "visa a garantir". Sem preposição, "visar" significa "dar visto em".'},
{q:'Como se usa "informar" corretamente?',ctx:'',opts:['Informei sobre o cliente do prazo de recurso.','Informei ao cliente o prazo de recurso.','Informei para o cliente sobre o prazo de recurso.','Informei o prazo de recurso para o cliente.'],correct:1,exp:'"Informar" admite: "informei ao cliente o prazo" (objeto indireto + direto) ou "informei o cliente do prazo" (objeto direto + indireto). A opção B e D estão corretas; a B é mais formal.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m6s2',day:'Quinta',title:'Regência verbal — preferir, chegar, ir e outros',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Mais verbos de uso frequente com regência específica:</div><div class="rule"><strong>Preferir</strong> → a (nunca "do que" ou "mais que")<br><strong>Chegar / ir</strong> → a: "chegou <strong>ao</strong> escritório", "foi <strong>à</strong> reunião"<br><strong>Implicar</strong> (acarretar) → objeto direto (sem preposição)<br><strong>Proceder</strong> (realizar) → a: "procedeu <strong>à</strong> análise"</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Prefiro a minuta mais que o rascunho.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Prefiro a minuta <strong>à</strong> versão anterior.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">A cláusula implica em mudança no contrato.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A cláusula implica mudança no contrato. <em style="color:#999">(sem "em")</em></span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Procedemos com a análise dos documentos.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Procedemos <strong>à</strong> análise dos documentos.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase usa "preferir" corretamente?',ctx:'',opts:['Prefiro o modelo mais que o anterior.','Prefiro o modelo do que o anterior.','Prefiro o modelo ao anterior.','Prefiro mais o modelo que o anterior.'],correct:2,exp:'"Preferir" exige a preposição "a" (que com o artigo forma "ao/à"). Nunca "mais que", "do que" ou "mais do que" — esses usos são incorretos na norma culta.'},
{q:'Qual frase tem regência correta?',ctx:'',opts:['A cláusula implica em rescisão imediata do contrato.','A cláusula implica rescisão imediata do contrato.','A cláusula implica sobre a rescisão imediata do contrato.','A cláusula implica de rescisão imediata do contrato.'],correct:1,exp:'"Implicar" com sentido de acarretar é transitivo direto — não exige preposição. "Implica em" é um dos erros mais comuns no meio jurídico.'},
{q:'Qual está correto?',ctx:'',opts:['Procedemos com a vistoria do imóvel.','Procedemos em vistoria do imóvel.','Procedemos à vistoria do imóvel.','Procedemos de vistoria do imóvel.'],correct:2,exp:'"Proceder" com sentido de realizar exige a preposição "a": "procedemos à vistoria". "Proceder com" muda o sentido para "agir com".'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m7',title:'Regência nominal',desc:'Substantivos e adjetivos também exigem preposições específicas.',sessions:[
{id:'m7s1',day:'Segunda',title:'Regência nominal — adjetivos e seus complementos',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Assim como os verbos, substantivos e adjetivos exigem preposições específicas para ligar seus complementos. Errar a preposição compromete o sentido.</div><div class="rule">Adjetivos de uso frequente e suas preposições:<br><strong>Apto a</strong> (não "para"): "apto <strong>a</strong> exercer a função"<br><strong>Favorável a</strong>: "favorável <strong>à</strong> proposta"<br><strong>Contrário a</strong>: "contrário <strong>à</strong> decisão"<br><strong>Compatível com</strong>: "compatível <strong>com</strong> o contrato"<br><strong>Responsável por</strong>: "responsável <strong>pelo</strong> processo"</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">O réu é apto para responder pelo crime.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O réu é apto <strong>a</strong> responder pelo crime.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">A decisão foi contrária com os interesses do cliente.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">A decisão foi contrária <strong>aos</strong> interesses do cliente.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase tem regência nominal correta?',ctx:'',opts:['O contrato é compatível ao modelo aprovado.','O contrato é compatível com o modelo aprovado.','O contrato é compatível para o modelo aprovado.','O contrato é compatível de acordo com o modelo.'],correct:1,exp:'"Compatível" rege a preposição "com": "compatível com". Não se usa "a", "para" ou outras preposições com esse adjetivo.'},
{q:'Assinale a alternativa correta:',ctx:'',opts:['A estagiária é responsável do setor de contratos.','A estagiária é responsável em o setor de contratos.','A estagiária é responsável pelo setor de contratos.','A estagiária é responsável para o setor de contratos.'],correct:2,exp:'"Responsável" rege "por": "responsável pelo setor". A preposição "por" + "o" = "pelo".'},
{q:'Qual alternativa usa regência nominal incorreta?',ctx:'',opts:['A parte é favorável à proposta de acordo.','A cláusula é contrária às normas regulatórias.','O documento é apto para ser protocolado.','O prazo é compatível com o cronograma.'],correct:2,exp:'"Apto" exige a preposição "a", não "para": "o documento é apto a ser protocolado". "Apto para" é incorreto na norma culta.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m7s2',day:'Quinta',title:'Regência nominal — substantivos e locuções',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Substantivos também exigem preposições fixas. Usar a preposição errada é sinal de pouco domínio da língua.</div><div class="rule">Substantivos frequentes em textos profissionais:<br><strong>Dúvida sobre / acerca de</strong> (não "de"): "dúvida <strong>sobre</strong> o prazo"<br><strong>Necessidade de</strong>: "necessidade <strong>de</strong> ajustes"<br><strong>Direito a</strong>: "direito <strong>à</strong> defesa"<br><strong>Respeito a / por</strong>: "respeito <strong>à</strong> norma"<br><strong>Discordância com / de</strong>: "discordância <strong>com</strong> a decisão"</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Tenho dúvidas do prazo para recurso.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Tenho dúvidas <strong>sobre</strong> o prazo para recurso.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">O réu tem direito ao recurso de apelação.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O réu tem direito <strong>ao</strong> recurso de apelação. <em style="color:#999">(este está correto)</em></span></div><div class="warn" style="margin-top:10px">"Dúvida de" é coloquial e deve ser evitado em comunicações formais. Use sempre "dúvida sobre" ou "dúvida quanto a".</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase tem regência nominal correta?',ctx:'',opts:['Tenho dúvida do procedimento correto a seguir.','Tenho dúvida sobre o procedimento correto a seguir.','Tenho dúvida em relação ao procedimento a seguir.','Tenho dúvida no procedimento correto a seguir.'],correct:1,exp:'"Dúvida sobre" é a regência correta na norma culta. "Dúvida de" é coloquial e inadequado em textos formais. "Dúvida em relação a" é aceito, mas mais informal.'},
{q:'Assinale a alternativa correta:',ctx:'',opts:['O cliente tem direito de recorrer da decisão.','O cliente tem direito em recorrer da decisão.','O cliente tem direito a recorrer da decisão.','O cliente tem direito para recorrer da decisão.'],correct:2,exp:'"Direito a" — o substantivo "direito" rege a preposição "a". "Direito de" também é aceito. "Em" e "para" estão errados.'},
{q:'Qual está errado?',ctx:'',opts:['A necessidade de ajustes foi identificada na análise.','A discordância com a proposta foi formalizada.','O desrespeito às normas gera consequências.','A dúvida de prazo foi esclarecida pelo advogado.'],correct:3,exp:'"Dúvida de prazo" está errado. O correto é "dúvida sobre o prazo" ou "dúvida quanto ao prazo". "Dúvida de" é coloquial e não pertence ao registro formal.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m8',title:'Redundâncias e pleonasmos',desc:'Palavras e expressões desnecessárias que comprometem a clareza e a objetividade do texto.',sessions:[
{id:'m8s1',day:'Segunda',title:'Pleonasmos viciosos — o que cortar',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Pleonasmo vicioso é a repetição desnecessária de uma ideia já contida na palavra anterior. Em textos profissionais, compromete a objetividade e passa impressão de descuido.</div><div class="rule">Pleonasmos mais comuns:<br>"<strong>subir</strong> para cima" → subir já implica "para cima"<br>"<strong>entrar</strong> para dentro" → idem<br>"<strong>elo</strong> de ligação" → elo já é uma ligação<br>"<strong>certeza</strong> absoluta" → certeza já é absoluta<br>"<strong>consenso</strong> geral" → consenso já é geral<br>"<strong>resultado</strong> final" → resultado já é final</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Chegamos a um consenso geral sobre o contrato.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Chegamos a um <strong>consenso</strong> sobre o contrato.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">O resultado final da análise será apresentado amanhã.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O <strong>resultado</strong> da análise será apresentado amanhã.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Tenho absoluta certeza da informação.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Tenho <strong>certeza</strong> da informação.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase contém pleonasmo vicioso?',ctx:'',opts:['O prazo para recurso é de 15 dias.','O elo de ligação entre as partes foi o mediador.','A audiência foi adiada por ausência das partes.','A proposta foi aceita por ambas as partes.'],correct:1,exp:'"Elo de ligação" é pleonasmo — elo já significa ligação. O correto é apenas "o elo entre as partes" ou "a ligação entre as partes".'},
{q:'Qual das opções está correta (sem pleonasmo)?',ctx:'',opts:['Chegamos a um consenso geral sobre o acordo.','O resultado final será comunicado na sexta.','A certeza absoluta é que o prazo vence hoje.','O advogado apresentou suas conclusões finais.'],correct:3,exp:'Atenção: "conclusões finais" pode parecer pleonasmo, mas é aceitável — conclusões podem ser parciais ou finais num relatório. As demais têm pleonasmos claros: "consenso geral", "resultado final", "certeza absoluta".'},
{q:'Qual frase elimina corretamente o pleonasmo?',ctx:'A reunião foi realizada às 14h da tarde.',opts:['A reunião foi realizada às 14h.','A reunião foi realizada à tarde às 14h da tarde.','A reunião foi realizada às 14 horas da tarde.','A reunião foi realizada no período da tarde às 14h.'],correct:0,exp:'"14h" já indica tarde (14 = 14h da tarde no sistema de 24h). "Da tarde" é redundante. A forma correta e objetiva é "realizada às 14h".'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m8s2',day:'Quinta',title:'Palavras desnecessárias e frases inchadas',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Além dos pleonasmos, há palavras e expressões que só ocupam espaço sem acrescentar sentido. Textos profissionais devem ser objetivos e diretos.</div><div class="rule">Expressões para evitar e suas versões enxutas:<br>"<strong>no sentido de</strong>" → para<br>"<strong>em função de</strong>" → por, devido a<br>"<strong>pelo fato de que</strong>" → porque<br>"<strong>tendo em vista o fato de que</strong>" → porque, como<br>"<strong>na oportunidade</strong>" → agora, neste momento<br>"<strong>conforme já mencionado anteriormente</strong>" → conforme mencionado</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Encaminhamos o documento no sentido de dar prosseguimento ao processo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Encaminhamos o documento <strong>para dar prosseguimento</strong> ao processo.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Pelo fato de que o prazo venceu, o recurso foi indeferido.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Como</strong> o prazo venceu, o recurso foi indeferido.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase está mais objetiva e correta?',ctx:'',opts:['Encaminhamos o relatório no sentido de informar o cliente sobre o andamento.','Encaminhamos o relatório para informar o cliente sobre o andamento.','Encaminhamos o relatório tendo em vista o fato de que o cliente precisa ser informado.','Encaminhamos o relatório pelo fato de que o cliente deve ser informado sobre o andamento.'],correct:1,exp:'"Para informar" é direto e objetivo. As demais opções usam expressões inchadas ("no sentido de", "tendo em vista o fato de que", "pelo fato de que") que podem ser substituídas por "para" ou "porque".'},
{q:'Qual alternativa elimina a palavra desnecessária?',ctx:'"Na oportunidade, gostaríamos de informar que o prazo vence na sexta."',opts:['Na presente oportunidade, gostaríamos de informar que o prazo vence na sexta.','Gostaríamos de informar que o prazo vence na sexta.','Na oportunidade em questão, informamos que o prazo vence na sexta.','Nesta oportunidade presente, informamos que o prazo vence na sexta.'],correct:1,exp:'"Na oportunidade" é expressão vaga e desnecessária. A frase começa diretamente com o que importa: "Gostaríamos de informar..." ou ainda mais direto: "O prazo vence na sexta."'},
{q:'Qual frase está mais objetiva?',ctx:'',opts:['Tendo em vista o fato de que houve atraso, solicitamos prorrogação.','Em função de ter havido atraso, solicitamos prorrogação do prazo.','Como houve atraso, solicitamos prorrogação do prazo.','Pelo motivo de que houve atraso, solicitamos prorrogação do prazo.'],correct:2,exp:'"Como houve atraso" é direto e claro. "Tendo em vista o fato de que", "em função de" e "pelo motivo de que" são construções pesadas que podem ser substituídas por "como", "porque" ou "já que".'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m9',title:'Vícios de linguagem',desc:'Gerundismo, "a nível de", "em termos de" e outras construções que devem ser eliminadas.',sessions:[
{id:'m9s1',day:'Segunda',title:'Gerundismo e construções verbais incorretas',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Gerundismo é o uso excessivo e inadequado do gerúndio, especialmente na forma "estar + verbo no gerúndio" para indicar ação futura. É inadmissível em textos profissionais.</div><div class="rule">O gerundismo aparece quando se usa gerúndio onde o futuro do indicativo seria correto.</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">Vou estar encaminhando o documento amanhã.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Encaminharei o documento amanhã.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Estarei verificando o prazo e retornarei o contato.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Verificarei o prazo e retornarei o contato.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Vou estar analisando o processo nas próximas horas.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">Analisarei o processo nas próximas horas.</span></div><div class="warn" style="margin-top:10px">Atenção: o gerúndio tem usos legítimos. "Estou analisando agora" (ação em curso) está correto. O erro é usá-lo para futuro.</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase contém gerundismo?',ctx:'',opts:['Estou analisando o contrato agora.','Estarei enviando o relatório amanhã de manhã.','Estávamos revisando os documentos quando você ligou.','O advogado está aguardando a decisão.'],correct:1,exp:'"Estarei enviando" é gerundismo — usa gerúndio para indicar ação futura. O correto é "Enviarei o relatório amanhã". As demais estão corretas: indicam ação em curso.'},
{q:'Qual é a versão correta da frase?',ctx:'"Vou estar retornando o seu contato em breve."',opts:['Estarei retornando o seu contato em breve.','Retornarei o seu contato em breve.','Vou retornar o seu contato em breve.','Tanto B quanto C estão corretos.'],correct:3,exp:'Tanto "Retornarei o seu contato em breve" quanto "Vou retornar o seu contato em breve" estão corretos — ambos expressam futuro sem gerundismo. A forma "estarei retornando" é o gerundismo a evitar.'},
{q:'Qual frase usa o gerúndio corretamente?',ctx:'',opts:['Vou estar analisando o caso na semana que vem.','Estarei protocolando a petição amanhã.','O assistente estava arquivando os documentos quando o sistema caiu.','Estarei entrando em contato assim que possível.'],correct:2,exp:'"Estava arquivando quando o sistema caiu" — gerúndio correto: indica ação em andamento no passado que foi interrompida. As demais usam gerúndio para indicar ação futura, que é o gerundismo a evitar.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m9s2',day:'Quinta',title:'"A nível de", "em termos de" e outros vícios',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Algumas expressões se disseminaram no ambiente profissional mas são incorretas ou desnecessárias. Identificá-las é essencial para uma comunicação de qualidade.</div><div class="rule">"<strong>A nível de</strong>" → no nível de, em nível de, quanto a<br>"<strong>Em termos de</strong>" → quanto a, em relação a, no que se refere a<br>"<strong>Enquanto</strong>" (no sentido de "como") → como<br>"<strong>Enquanto que</strong>" → enquanto (o "que" é desnecessário)</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">A nível de contrato, não há pendências.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Quanto ao</strong> contrato, não há pendências.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Em termos de prazo, ainda temos 5 dias.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Quanto ao</strong> prazo, ainda temos 5 dias.</span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">Enquanto advogada, ela conhece bem o processo.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Como</strong> advogada, ela conhece bem o processo.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase elimina corretamente o vício "a nível de"?',ctx:'"A nível de documentação, tudo está regularizado."',opts:['Em nível de documentação, tudo está regularizado.','Quanto à documentação, tudo está regularizado.','A nível da documentação, tudo está regularizado.','No nível de documentação, tudo está regularizado.'],correct:1,exp:'"Quanto à documentação" é a substituição mais natural e correta. "Em nível de" é aceito em alguns contextos formais, mas "quanto a" é sempre mais preciso e elegante.'},
{q:'Qual frase substitui corretamente "em termos de"?',ctx:'"Em termos de prazo, o contrato prevê 30 dias."',opts:['Em termos do prazo, o contrato prevê 30 dias.','Quanto ao prazo, o contrato prevê 30 dias.','Nos termos do prazo, o contrato prevê 30 dias.','Em relação ao prazo, o contrato prevê 30 dias. '],correct:1,exp:'"Quanto ao prazo" é a substituição mais limpa e direta. "Em relação ao prazo" também é aceitável (opção D está correta também), mas "quanto a" é mais objetivo.'},
{q:'Qual frase está correta?',ctx:'',opts:['Enquanto gestor, você deve assinar o documento.','Enquanto que o contrato não seja assinado, nada pode ser feito.','Como gestor, você deve assinar o documento.','A nível de gestão, o documento precisa de aprovação.'],correct:2,exp:'"Como gestor" é a forma correta — "enquanto" no sentido de "na qualidade de" é uso inadequado em português. "Enquanto que" também é incorreto — o correto é só "enquanto". "A nível de" é vício de linguagem.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m10',title:'Conectivos e coesão textual',desc:'Como ligar ideias com precisão — portanto, porém, contudo, todavia e outros.',sessions:[
{id:'m10s1',day:'Segunda',title:'Conectivos — cada um no seu lugar',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Conectivos ligam ideias e indicam a relação entre elas. Usar o conectivo errado distorce o sentido da frase. Em textos profissionais, a escolha precisa ser cuidadosa.</div><div class="rule">Conectivos e suas funções:<br><strong>Adversativos</strong> (ideia contrária): mas, porém, contudo, todavia, entretanto, no entanto<br><strong>Conclusivos</strong> (conclusão): portanto, logo, assim, por conseguinte, destarte<br><strong>Explicativos</strong> (explicação): porque, pois, que, porquanto<br><strong>Aditivos</strong> (adição): e, também, além disso, ademais, outrossim</div><div class="erb"><span class="bk bk-err">Errado</span><span class="et">O prazo venceu, portanto o advogado entrou com o recurso.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O prazo venceu, <strong>mas</strong> o advogado ainda entrou com o recurso. <em style="color:#999">(ideia contrária → adversativo)</em></span></div><div class="erb" style="margin-top:6px"><span class="bk bk-err">Errado</span><span class="et">O processo foi analisado, mas o recurso foi negado.</span></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et">O processo foi analisado; <strong>portanto</strong>, o recurso foi negado. <em style="color:#999">(conclusão → conclusivo)</em></span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual conectivo completa corretamente a frase?',ctx:'A documentação estava incompleta; ___, o processo foi arquivado.',opts:['porém','todavia','portanto','mas'],correct:2,exp:'"Portanto" indica conclusão — a documentação incompleta levou ao arquivamento. "Porém", "todavia" e "mas" indicam contraste, o que não faz sentido aqui.'},
{q:'Qual conectivo indica contraste corretamente?',ctx:'O réu compareceu à audiência; ___, não trouxe a documentação exigida.',opts:['portanto','logo','por conseguinte','no entanto'],correct:3,exp:'"No entanto" é adversativo — indica que o segundo fato contraria a expectativa criada pelo primeiro. "Portanto", "logo" e "por conseguinte" indicariam conclusão, não contraste.'},
{q:'Qual frase usa o conectivo incorretamente?',ctx:'',opts:['O contrato foi assinado; portanto, o serviço pode ser iniciado.','A proposta foi recusada; no entanto, uma nova reunião foi agendada.','O cliente pagou a taxa; todavia, o processo avançou para a próxima fase.','A documentação estava completa; logo, o cadastro foi aprovado.'],correct:2,exp:'"Todavia" indica contraste, mas a frase apresenta consequência natural (pagou → avançou). O conectivo correto seria "portanto" ou "assim". "Todavia" seria adequado se a segunda ideia contrariasse a primeira.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m10s2',day:'Quinta',title:'Coesão textual — referência e sequenciação',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Coesão é a capacidade do texto de se sustentar como unidade — as ideias devem estar bem encadeadas, sem rupturas ou repetições desnecessárias.</div><div class="rule">Recursos de coesão:<br><strong>Referência:</strong> usar pronomes ou sinônimos para retomar algo já dito<br><strong>Substituição lexical:</strong> trocar palavra por sinônimo para evitar repetição<br><strong>Sequenciação:</strong> ordenar as ideias com conectivos temporais e lógicos<br><strong>Elipse:</strong> omitir elemento já mencionado sem prejuízo do sentido</div><div class="erb"><span class="bk bk-err">Sem coesão</span><span class="et">O contrato foi enviado. O contrato será analisado. O contrato deverá ser devolvido em 5 dias.</span></div><div class="erb"><span class="bk bk-ok">Com coesão</span><span class="et">O contrato foi enviado, será analisado e <strong>deverá ser devolvido em 5 dias</strong>.</span></div><div class="div"></div><div class="body-txt"><strong>Sequenciadores temporais em comunicações:</strong></div><div class="erb"><span class="bk bk-ok">Certo</span><span class="et"><strong>Primeiramente</strong>, revisamos o contrato. <strong>Em seguida</strong>, solicitamos os ajustes. <strong>Por fim</strong>, encaminhamos ao cliente.</span></div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual versão é mais coesa?',ctx:'',opts:['O parecer foi elaborado. O parecer foi revisado. O parecer foi aprovado pela diretoria.','O parecer foi elaborado, revisado e aprovado pela diretoria.','O parecer foi elaborado. E revisado. E depois aprovado pela diretoria.','O parecer foi elaborado; o parecer foi revisado; o parecer foi aprovado.'],correct:1,exp:'A opção B usa elipse (omite "o parecer" nas ações subsequentes) e reúne as três ações em uma estrutura paralela, tornando o texto mais fluido e profissional.'},
{q:'Qual trecho apresenta problema de coesão?',ctx:'',opts:['Primeiramente, analisamos a documentação. Em seguida, identificamos as pendências. Por fim, emitimos o parecer.','O contrato foi assinado pelas partes. Ele entrará em vigor na próxima semana.','A proposta foi aceita. A proposta foi formalizada. A proposta foi enviada ao cliente.','O prazo foi prorrogado, pois os documentos ainda não haviam chegado.'],correct:2,exp:'A opção C repete "a proposta" três vezes sem necessidade — falta coesão por ausência de elipse e substituição. O correto seria: "A proposta foi aceita, formalizada e enviada ao cliente."'},
{q:'Qual sequenciador está sendo usado incorretamente?',ctx:'',opts:['Primeiramente, analisamos o contrato. Por fim, identificamos as pendências. Em seguida, emitimos o relatório.','Primeiramente, analisamos o contrato. Em seguida, identificamos as pendências. Por fim, emitimos o relatório.','Primeiro, analisamos o contrato. Depois, identificamos as pendências. Por fim, emitimos o relatório.','Inicialmente, analisamos o contrato. A seguir, identificamos as pendências. Por último, emitimos o relatório.'],correct:0,exp:'Na opção A, a ordem lógica está errada: "por fim" vem antes de "em seguida", o que inverte a sequência. Sequenciadores temporais devem respeitar a ordem cronológica/lógica das ações.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m11',title:'Formalidade e vocabulário',desc:'Registro adequado em e-mails, comunicados e documentos profissionais.',sessions:[
{id:'m11s1',day:'Segunda',title:'Registro formal — o que evitar em textos profissionais',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">O registro de um texto deve ser adequado ao contexto. Em comunicações profissionais, o registro informal compromete a credibilidade.</div><div class="rule">Substitua expressões coloquiais por equivalentes formais:<br>"<strong>né</strong>" → não é, não é mesmo<br>"<strong>tá</strong>" → está, certo<br>"<strong>pra</strong>" → para<br>"<strong>aí</strong>" → então, assim, desse modo<br>"<strong>daí</strong>" → por isso, portanto<br>"<strong>tipo</strong>" → como, por exemplo<br>"<strong>meio que</strong>" → de certa forma, de algum modo</div><div class="erb"><span class="bk bk-err">Informal</span><span class="et">Aí eu liguei pra secretaria e eles falaram que tá tudo certo.</span></div><div class="erb"><span class="bk bk-ok">Formal</span><span class="et">Liguei para a secretaria e fui informada de que tudo está regularizado.</span></div><div class="div"></div><div class="warn">Cuidado com o verbo "retornar" no sentido de ligar de volta — é um anglicismo. O correto é "retornar o contato" ou "ligar de volta".</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual e-mail usa registro formal adequado?',ctx:'',opts:['Oi, tudo bem? Queria avisar que o processo tá pronto pra assinar.','Prezado cliente, informamos que o documento está disponível para assinatura.','Olá! O documento tá pronto, pode passar aqui pra assinar né?','Bom dia, o processo ficou pronto, pode vir assinar quando quiser, tá?'],correct:1,exp:'A opção B usa saudação formal ("Prezado"), verbo formal ("informamos"), sem coloquialismos. As demais usam "tá", "pra", "né" e saudações informais inadequadas para comunicação profissional escrita.'},
{q:'Qual frase está em registro formal correto?',ctx:'',opts:['Daí a gente decidiu remarcar a reunião.','Portanto, decidimos remarcar a reunião.','Aí a equipe meio que chegou num consenso.','Tipo, o prazo acabou e a gente precisava de uma solução.'],correct:1,exp:'"Portanto, decidimos remarcar a reunião" — registro formal, conectivo adequado, pronome de tratamento correto ("decidimos" em vez de "a gente"). As demais usam "daí", "aí", "meio que", "tipo", "a gente" — todos inadequados em textos formais.'},
{q:'Qual versão reescreve corretamente a frase informal?',ctx:'"A gente vai retornar o contato do cliente amanhã cedo."',opts:['Nós vamos retornar o contato do cliente amanhã cedo.','Retornaremos o contato do cliente amanhã cedo.','Nós iremos estar retornando o contato do cliente amanhã.','A equipe vai retornar o contato do cliente amanhã bem cedo.'],correct:1,exp:'"Retornaremos o contato do cliente amanhã cedo" — elimina "a gente", usa futuro do indicativo (sem gerundismo) e mantém registro formal. "Nós vamos retornar" também é aceito, mas "retornaremos" é mais formal e conciso.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m11s2',day:'Quinta',title:'Vocabulário jurídico e profissional — usar com precisão',nq:3,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Usar termos técnicos com precisão é fundamental. Confundir termos parecidos compromete a comunicação e pode gerar mal-entendidos sérios.</div><div class="rule">Pares que confundem:<br><strong>Intimar x Notificar:</strong> intimação é ato do juízo; notificação pode ser extrajudicial<br><strong>Protocolar x Peticionar:</strong> protocolar é o ato de dar entrada; peticionar é formular um pedido<br><strong>Prazo x Período:</strong> prazo tem termo final definido; período é intervalo de tempo<br><strong>Deferir x Deferir:</strong> deferir = conceder; indeferir = negar</div><div class="erb"><span class="bk bk-err">Impreciso</span><span class="et">O juiz deferiu o pedido do réu.</span></div><div class="erb"><span class="bk bk-ok">Preciso</span><span class="et">O juiz <strong>deferiu</strong> o pedido do réu. <em style="color:#999">(= concedeu — se essa era a intenção)</em><br>O juiz <strong>indeferiu</strong> o pedido do réu. <em style="color:#999">(= negou — se era esse o caso)</em></span></div><div class="div"></div><div class="warn">Nunca confunda "mediante" (por meio de) com "através de" (passando de um lado ao outro). "Formalize através de e-mail" está errado. O correto é "formalize <strong>por</strong> e-mail" ou "formalize <strong>mediante</strong> e-mail".</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Qual frase usa o termo correto?',ctx:'',opts:['O pedido foi deferido pelo juiz, que negou a liminar.','O pedido foi indeferido pelo juiz, que negou a liminar.','O pedido foi deferido pelo juiz, que concedeu a liminar.','O pedido foi indeferido pelo juiz, que concedeu a liminar.'],correct:2,exp:'"Deferir" = conceder, autorizar. "Indeferir" = negar, rejeitar. A opção C é consistente: pedido deferido (concedido) → liminar concedida. A opção B seria: pedido indeferido (negado) → liminar negada.'},
{q:'Qual frase usa "mediante" ou "através de" corretamente?',ctx:'',opts:['A comunicação foi feita através de e-mail.','A comunicação foi feita mediante e-mail.','A comunicação foi feita através do advogado, que entregou a carta.','A comunicação foi feita mediante o advogado.'],correct:1,exp:'"Mediante e-mail" = por meio de e-mail — correto. "Através de" implica atravessar algo fisicamente. A opção C seria correta se dissesse "por intermédio do advogado". "Mediante o advogado" é inadequado — usa-se para instrumentos, não pessoas.'},
{q:'Qual frase usa o vocabulário profissional com mais precisão?',ctx:'',opts:['Precisamos protocolar um pedido para o juiz sobre o prazo.','Precisamos peticionar prorrogação do prazo perante o juízo.','Precisamos pedir para o juiz mais tempo no prazo.','Precisamos avisar o juiz que precisamos de mais prazo.'],correct:1,exp:'"Peticionar prorrogação do prazo perante o juízo" usa terminologia precisa: "peticionar" (formular pedido formal), "prorrogação" (extensão de prazo), "perante o juízo" (ao órgão competente). As demais usam linguagem vaga ou informal.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]}
]},
{id:'m12',title:'Revisão e simulado final',desc:'Integração de todos os temas — exercícios combinados e simulado completo.',sessions:[
{id:'m12s1',day:'Segunda',title:'Revisão integrada — erros combinados',nq:4,steps:[
{type:'learn',phase:'Leitura (5 min)',html:`<div class="body-txt">Chegamos ao último módulo. Na prática profissional, os erros raramente aparecem isolados — um texto pode ter vírgula errada, vício de linguagem e concordância incorreta ao mesmo tempo.</div><div class="rule">Checklist antes de enviar qualquer texto:<br>1. Verifiquei a concordância do verbo com o sujeito?<br>2. Usei "a mesma/o mesmo" ou "esta/esse" para retomar pessoa? (eliminar)<br>3. Há pleonasmos ou palavras desnecessárias?<br>4. Os conectivos expressam a relação correta entre as ideias?<br>5. A crase está correta onde necessária?<br>6. O registro é formal e adequado ao destinatário?</div><div class="rdb"><strong>Texto com múltiplos erros:</strong><br>"Fui a secretaria e a mesma me informou que houveram adiamentos. Mais que o Dr. Silva estarão verificando e retornarão o contato a nível de prazo."</div><div class="grb"><strong>Versão correta:</strong><br>"Fui <strong>à</strong> secretaria e <strong>a servidora</strong> me informou que <strong>houve</strong> adiamentos, <strong>mas</strong> que o Dr. Silva <strong>verificará</strong> e retornará o contato <strong>quanto ao</strong> prazo."</div>`},
{type:'quiz',phase:'Prática (7 min)',questions:[
{q:'Quantos erros há nesta frase?',ctx:'"A mesma me informou que houveram dois processos adiados, mais que estarei verificando."',opts:['1 erro','2 erros','3 erros','4 erros'],correct:3,exp:'São 4 erros: (1) "a mesma" — vício pronominal; (2) "houveram" — haver impessoal não vai ao plural; (3) "mais" no lugar de "mas"; (4) "estarei verificando" — gerundismo. Correto: "Ela me informou que houve dois processos adiados, mas que verificarei."'},
{q:'Qual frase está completamente correta?',ctx:'',opts:['Houveram pendências, mais a mesma foi resolvida pela assessora.','Houve pendências, mas elas foram resolvidas pela assessora.','Houveram pendências, mas as mesmas foram resolvidas pela assessora.','Houve pendências, porém a mesma foi resolvida pela assessora.'],correct:1,exp:'"Houve pendências, mas elas foram resolvidas pela assessora" — haver no singular (impessoal), "mas" adversativo correto, "elas" pronome pessoal adequado no lugar de "as mesmas".'},
{q:'Reescreva mentalmente e assinale a versão correta:',ctx:'"Vou estar encaminhando o documento a assessora assim que a mesma retornar."',opts:['Encaminharei o documento à assessora assim que a mesma retornar.','Encaminharei o documento à assessora assim que ela retornar.','Vou encaminhar o documento a assessora assim que ela retornar.','Estarei encaminhando o documento à assessora assim que ela retornar.'],correct:1,exp:'"Encaminharei o documento à assessora assim que ela retornar" — elimina gerundismo (encaminharei), corrige crase (à assessora) e elimina vício pronominal (ela, não "a mesma").'},
{q:'Qual texto está em registro e gramática adequados?',ctx:'',opts:['Daí a gente viu que houveram erros no contrato e a mesma foi corrigida.','Portanto, identificamos que houve erros no contrato, e ele foi corrigido.','Aí nós vimos que houveram erros no contrato, mais o mesmo foi corrigido.','Então a gente identificou que houveram erros no contrato e os mesmos foram corrigidos.'],correct:1,exp:'A opção B está completamente correta: conectivo adequado ("portanto"), pronome de tratamento formal ("identificamos"), haver no singular ("houve"), pronome pessoal correto ("ele"). As demais acumulam erros de registro, gramática e vício pronominal.'}
]},
{type:'finish',phase:'Revisão (3 min)'}
]},
{id:'m12s2',day:'Quinta',title:'Simulado final — 12 questões integradas',nq:5,steps:[
{type:'learn',phase:'Leitura (2 min)',html:`<div class="body-txt">Este é o simulado final do programa. As questões integram todos os temas estudados e reproduzem situações reais do cotidiano profissional.</div><div class="rule">Temas cobertos neste simulado:<br>&#10003; Pronomes ("a mesma", "esta/esse")<br>&#10003; Verbo haver<br>&#10003; Vírgula e pontuação<br>&#10003; Concordância verbal e nominal<br>&#10003; Crase<br>&#10003; Regência verbal e nominal<br>&#10003; Redundâncias e vícios<br>&#10003; Conectivos e coesão<br>&#10003; Formalidade e vocabulário</div><div class="body-txt" style="margin-top:10px">Responda com calma. Ao final, você verá sua nota e os pontos que ainda precisam de reforço.</div>`},
{type:'quiz',phase:'Simulado final (12 min)',questions:[
{q:'Qual frase está completamente correta?',ctx:'',opts:['Houveram muitos erros no relatório e a mesma foi devolvida.','Houve muitos erros no relatório e ele foi devolvido.','Houveram muitos erros no relatório mas o mesmo foi corrigido.','Houve muitos erros no relatório, mais o mesmo foi corrigido.'],correct:1,exp:'Haver impessoal no singular ("houve"), pronome pessoal correto ("ele"), conectivo adversativo correto ("e...devolvido" indica consequência direta). Todos os outros erram em ao menos dois pontos.'},
{q:'Assinale o erro de crase:',ctx:'',opts:['Encaminhei o processo à assessora responsável.','Às 14h, a reunião será iniciada.','O documento ficou à disposição das partes.','Enviei o e-mail à ela para revisão.'],correct:3,exp:'"À ela" está errado — pronomes pessoais nunca levam crase. O correto é "a ela". As demais estão corretas: "à assessora", "às 14h", "à disposição".'},
{q:'Qual frase tem regência verbal correta?',ctx:'',opts:['A medida visa resolver o impasse entre as partes.','A medida visa a resolver o impasse entre as partes.','A cláusula implica em penalidade ao contratante.','Prefiro este modelo mais que o anterior.'],correct:1,exp:'"Visar" com sentido de objetivar exige "a": "visa a resolver". "Implicar" (acarretar) é transitivo direto — sem "em". "Preferir" exige "a", não "mais que".'},
